*{box-sizing:border-box;margin:0;padding:0}
:root{

body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);min-height:100vh;color:var(--text)}

.prog-head:hover{background:var(--lav-light)}

.avail-some{background:#fff8e1;color:#c47000}
.avail-full{background:#fce4ec;color:#c62828}

.slots{display:none;padding:8px 14px 12px}
.slots.open{display:block}
.slot{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;border:1px solid var(--lav-mid);margin-bottom:6px;cursor:pointer;transition:background .1s;background:#fff}
.slot:last-child{margin-bottom:0}
.slot:hover:not(.full){background:var(--lav-light)}
.slot.full{opacity:.65;cursor:default}
.slot-left{flex:1}
.slot-date{font-size:.88rem;font-weight:700}
.slot-time{font-size:.75rem;color:var(--muted);margin-top:1px}

.slot-avail-full{background:#fce4ec;color:#c62828}

// ── changes/ を読み込んでPROGSに反映 ─────────────────────────────
async function applyChanges(){
  try {
    const snap = await getDocs(collection(db, 'changes'));
    if(snap.empty) return;

    snap.docs.forEach(d => {
      const c = d.data();
      if(!c.targetId) return;

      // 対象プログラムを検索（id or 日付+名前で照合）
      const prog = PROGS.find(p =>
        p.id === c.targetId ||
        p.slots.some(s => toDateKey(s.date) === c.targetDate)
      );
      if(!prog) return;

      if(c.type === 'cancel'){
        // プログラム中止：該当スロットをfull+cancelledに
        prog.slots.forEach(s => {
          if(!c.targetDate || toDateKey(s.date) === c.targetDate){
            s.full = true;
            s.cancelled = true;
            s.changeNote = c.note || '中止';
          }
        });
      }
      if(c.type === 'time'){
        // 時間変更
        prog.slots.forEach(s => {
          if(!c.targetDate || toDateKey(s.date) === c.targetDate){
            s.time = c.newTime || s.time;
            s.changed = true;
            s.changeNote = c.note || `時間変更：${c.newTime}`;
          }
        });
      }
      if(c.type === 'cap'){
        // 定員変更
        if(c.newCap !== undefined) prog.cap = c.newCap;
        prog.capLabel = prog.capLabel.replace(/\d+組/, c.newCap+'組');
      }
      if(c.type === 'add'){
        // プログラム追加
        if(c.newSlot) prog.slots.push({
          date: c.newSlot.date,
          time: c.newSlot.time,
          bk: 0, full: false, added: true,
          changeNote: '追加'
        });
      }
    });
  } catch(e){
    console.warn('changes読み込みエラー:', e.message);
  }
}

function filterMonth(){ render(); }

function render(){
  const avail = prog => prog.slots.some(s=>!s.full);
  let html = '';
  let okCount = 0;
  PROGS.forEach(p=>{
    const hasAvail = avail(p);
    if(hasAvail) okCount++;
    const isOpen = openId === p.id;
    const allFull = p.slots.every(s=>s.full);
    const someAvail = hasAvail && p.slots.some(s=>s.bk>0);
    const availClass = allFull ? 'avail-full' : someAvail ? 'avail-some' : 'avail-ok';
    const availText = allFull ? '満員' : someAvail ? '残りわずか' : '空きあり';
    html += `<div class="prog-group">
      <div class="prog-head ${isOpen?'open':''}" onclick="toggleProg('${p.id}')">
        <div class="prog-emoji" style="background:${p.bg}">${p.emoji}</div>
        <div class="prog-meta">
          <div class="prog-name">${p.name}</div>
          <div class="prog-cap">${p.capLabel}</div>
        </div>
        <span class="prog-avail ${availClass}">${availText}</span>
        <span class="chevron ${isOpen?'open':''}">›</span>
      </div>
      <div class="slots ${isOpen?'open':''}">`;
    p.slots.forEach((s,si)=>{
      // 空き状況テキストバッジ（ドット廃止）
      let availBadge = '';
      if(s.cancelled){
        availBadge = '';
      } else if(s.full){
        availBadge = `<span class="slot-avail slot-avail-full">満員</span>`;
      } else if(p.cap < 99 && s.bk >= p.cap - 1 && s.bk > 0){
        availBadge = `<span class="slot-avail slot-avail-some">残りわずか</span>`;
      } else {
        availBadge = `<span class="slot-avail slot-avail-ok">空きあり</span>`;
      }

      // 変更バッジ
      let changeBadge = '';
      if(s.cancelled) changeBadge = `<span class="change-badge badge-cancel">⚠️ ${s.changeNote||'中止'}</span>`;
      else if(s.changed) changeBadge = `<span class="change-badge badge-change">🔔 ${s.changeNote||'変更あり'}</span>`;
      else if(s.added)   changeBadge = `<span class="change-badge badge-add">🆕 追加</span>`;

      html += `<div class="slot ${s.full?'full':''}" onclick="${s.full||s.cancelled?'':'openModal(\''+p.id+'\','+si+')'}">
        <div class="slot-left">
          <div class="slot-date">${s.date}</div>
          ${s.label ? `<div class="slot-time" style="color:var(--lav-dark);font-weight:700">${s.label}</div>` : ''}
          <div class="slot-time">${s.time}</div>
          ${changeBadge}
        </div>
        ${availBadge}
        <button class="${s.full||s.cancelled?'btn-reserve btn-full':'btn-reserve btn-ok'}" ${s.full||s.cancelled?'disabled':''}>
          ${s.cancelled ? '中止' : s.full ? '満員' : '予約する'}
        </button>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('main').innerHTML = html;
  document.getElementById('countLabel').textContent = `${okCount}件 空きあり`;
}

function toggleProg(id){
  openId = openId === id ? null : id;
  render();
}

// 託児付きプログラムのID
const TOCHI_PROGS = ['pulapan','yoga','tochi'];

// ── 託児の上限チェック ────────────────────────────────────────────────
async function checkTochiLimits(tel, dateKey) {
  if (!tel) return { ok: true };
  try {
    // 当月の確定予約を取得
    const monthStart = '2026-04-01';
    const monthEnd   = '2026-04-30';
    const snap = await getDocs(query(
      collection(db, 'bookings'),
      where('progId',  '==', 'tochi'),
      where('tel',     '==', tel),
      where('date',    '>=', monthStart),
      where('date',    '<=', monthEnd),
      where('status',  'in', ['confirmed','pending'])
    ));
    const monthBookings = snap.docs.map(d => d.data());
    const monthCount = monthBookings.length;

    // 月4枠上限チェック
    if (monthCount >= 4) {
      return { ok: false, msg: '今月の託児予約上限（4枠）に達しています。\n利用完了後に次の予約が可能です。' };
    }

    // 同日予約チェック
    const sameDay = monthBookings.find(b => b.date === dateKey);
    if (sameDay) {
      return { ok: false, msg: 'この日はすでに託児の予約があります。\n（1日1枠まで）' };
    }

    return { ok: true, remaining: 4 - monthCount };
  } catch(e) {
    console.warn('上限チェックエラー:', e.message);
    return { ok: true }; // エラー時は通す
  }
}

// ── 託児複数枠選択状態 ────────────────────────────────────────────────
let tochiExtraSlots = []; // 2枠目の日程

function openModal(progId, slotIdx){
  const p = PROGS.find(x=>x.id===progId);
  const s = p.slots[slotIdx];
  selectedSlot = {prog:p, slot:s};
  tochiExtraSlots = [];

  document.getElementById('mTitle').textContent  = `${p.emoji} ${p.name}`;
  document.getElementById('mDetail').textContent = `${s.date}　${s.time}　定員${p.cap<10?p.cap+'組':'制限なし'}`;
  document.getElementById('mDesc').textContent   = p.note;

  // 託児の場合：2枠目追加選択UIを表示
  const isTochi = p.id === 'tochi';
  const hasTochi = TOCHI_PROGS.includes(p.id);
  document.getElementById('tochiRow').style.display     = hasTochi ? 'block' : 'none';
  document.getElementById('tochiTimeRow').style.display = 'none';
  document.getElementById('fTochi').value = 'no';

  // 2枠目選択行（託児専用）
  const extraRow = document.getElementById('tochiExtraRow');
  if (isTochi) {
    // 他の空き日程をセレクトに追加
    const otherSlots = p.slots.filter((_,i) => i !== slotIdx && !p.slots[i].full);
    let opts = '<option value="">追加しない（1枠のみ）</option>';
    otherSlots.forEach((os, i) => {
      opts += `<option value="${os.date||os.dateKey||i}">${os.date}　${os.time}</option>`;
    });
    document.getElementById('tochiExtraSelect').innerHTML = opts;
    extraRow.style.display = 'block';
  } else {
    extraRow.style.display = 'none';
  }

  // フォームリセット → キャッシュから復元
  const cache = JSON.parse(localStorage.getItem('hinokikko_user')||'{}');
  document.getElementById('fName').value      = cache.name      || '';
  document.getElementById('fKana').value      = cache.kana      || '';
  document.getElementById('fTel').value       = cache.tel       || '';
  document.getElementById('fAge').value       = cache.age       || '';
  document.getElementById('fChildCount').value= cache.childCount|| '1人';
  document.getElementById('fNote').value      = '';
  document.getElementById('fTochiTime').value = '';

  document.getElementById('formView').style.display   = 'block';
  document.getElementById('successView').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}

function toggleTochiTime(){
  const v = document.getElementById('fTochi').value;
  document.getElementById('tochiTimeRow').style.display = v==='yes' ? 'block' : 'none';
}

async function submitBooking(){
  const name       = document.getElementById('fName').value.trim();
  const kana       = document.getElementById('fKana').value.trim();
  const age        = document.getElementById('fAge').value;
  const childCount = document.getElementById('fChildCount').value;
  const tel        = document.getElementById('fTel').value.trim();
  const note       = document.getElementById('fNote').value.trim();
  const tochi      = document.getElementById('fTochi').value === 'yes';
  const tochiTime  = document.getElementById('fTochiTime').value.trim();

  if(!name){ alert('保護者氏名を入力してください'); return; }
  if(!age){  alert('お子さんの月齢を選択してください'); return; }
  if(!tel){  alert('連絡先を入力してください'); return; }

  const p = selectedSlot.prog;
  const s = selectedSlot.slot;

  // ── 託児の場合：上限チェック ────────────────────────────────────────
  if (p.id === 'tochi') {
    const dateK = toDateKey(s.date);

    // 2枠目選択確認
    const extraSel = document.getElementById('tochiExtraSelect');
    const extraIdx = extraSel ? extraSel.selectedIndex : 0;
    const hasExtra = extraSel && extraIdx > 0;
    const reserveCount = hasExtra ? 2 : 1;

    // 月残り枠チェック
    const check = await checkTochiLimits(tel, dateK);
    if (!check.ok) { alert(check.msg); return; }

    // 2枠予約しようとしているのに残り1枠の場合
    if (hasExtra && check.remaining < 2) {
      alert(`今月の残り枠は${check.remaining}枠です。\n1枠のみ予約してください。`);
      return;
    }
  }

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;
  btn.textContent = '送信中…';

  try {
    const dateK = toDateKey(s.date);
    const baseData = {
      progId:     p.id,
      progName:   p.name,
      date:       dateK,
      dateLabel:  s.date,
      time:       s.time,
      name, kana, age, childCount, tel, note,
      tochi,
      tochiTime:  tochi ? tochiTime : '',
      status:     'pending',
      bookedAt:   Timestamp.now()
    };

    // 1枠目を保存
    await addDoc(collection(db, 'bookings'), baseData);

    // 2枠目（託児のみ）
    if (p.id === 'tochi') {
      const extraSel = document.getElementById('tochiExtraSelect');
      if (extraSel && extraSel.selectedIndex > 0) {
        const extraSlotIdx = extraSel.selectedIndex - 1;
        const extraSlots   = p.slots.filter((_,i) => i !== p.slots.indexOf(s) && !p.slots[p.slots.indexOf(s)].full);
        if (extraSlots[extraSlotIdx]) {
          const es = extraSlots[extraSlotIdx];
          await addDoc(collection(db, 'bookings'), {
            ...baseData,
            date:      toDateKey(es.date),
            dateLabel: es.date,
            time:      es.time,
            bookedAt:  Timestamp.now()
          });
        }
      }
    }

    // キャッシュに保存（次回自動入力用）
    localStorage.setItem('hinokikko_user', JSON.stringify({name, kana, tel, age, childCount}));

    // 完了画面
    const extraSel2 = document.getElementById('tochiExtraSelect');
    const hasExtra2 = p.id==='tochi' && extraSel2 && extraSel2.selectedIndex > 0;
    document.getElementById('svDetail').innerHTML =
      `<div>📋 <strong>${p.emoji} ${p.name}</strong></div>
       <div>📅 ${s.date}　${s.time}</div>
       ${hasExtra2 ? `<div>📅 ${extraSel2.options[extraSel2.selectedIndex].text}（2枠目）</div>` : ''}
       <div>👤 ${name}（${age}）</div>
       <div>📱 ${tel}</div>
       ${tochi ? `<div>👶 託児利用：${tochiTime||'時間未定'}</div>` : ''}`;

    document.getElementById('formView').style.display   = 'none';
    document.getElementById('successView').style.display = 'block';

    // LINEトークに自動送信
    const extraSel3  = document.getElementById('tochiExtraSelect');
    const hasExtra3  = p.id==='tochi' && extraSel3 && extraSel3.selectedIndex > 0;
    const extraLabel = hasExtra3 ? extraSel3.options[extraSel3.selectedIndex].text : '';
    await sendLineMessage(p.name, s.date, s.time, name, hasExtra3, extraLabel);

  } catch(e) {
    console.error('予約保存エラー:', e);
    alert('送信に失敗しました。通信状況を確認してください。\n' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '予約を送信する';
  }
}

// グローバル公開（module内のため）
window.filterMonth   = filterMonth;
window.toggleProg    = toggleProg;
window.openModal     = openModal;
window.closeModal    = closeModal;
window.toggleTochiTime = toggleTochiTime;
window.submitBooking = submitBooking;

document.getElementById('modalBg').addEventListener('click', e => {
  if(e.target === document.getElementById('modalBg')) closeModal();
});

// changes/を読み込んでから初期表示
applyChanges().then(() => {
  render();
  // カレンダーからの遷移：URLパラメータでプログラムを自動展開
  const params = new URLSearchParams(location.search);
  const progName = params.get('prog');
  if(progName){
    const p = PROGS.find(x=>x.name.includes(progName)||progName.includes(x.name.split(' ')[0]));
    if(p){
      openId = p.id;
      render();
      // 最初の空きスロットを自動選択
      const si = p.slots.findIndex(s=>!s.full);
      if(si>=0) setTimeout(()=>openModal(p.id, si), 300);
    }
  }
});
</script>
