<!DOCTYPE html>
<html lang="ja">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3PVH1LLJFM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3PVH1LLJFM');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひのきっこ 子育て支援センター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d6a4f;--mint:#74c69d;--light:#f0faf4;--warm:#f9a03f;--cream:#fdf8f2;--text:#1a2e22;--muted:#6b8f71;--border:#dceee2;--lav:#dccfe6;--lav-light:#ede6f4;--lav-dark:#5a3f78;--lav-mid:#c9b8e0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);min-height:100vh;color:var(--text)}
header{background:#dccfe6;padding:0 20px}
.header-inner{display:flex;align-items:center;justify-content:center;gap:12px;padding:18px 20px 14px}
.header-title{font-size:1.9rem;font-weight:900;color:#3d2a55;letter-spacing:-.02em;font-family:'Noto Sans JP',sans-serif}
.header-sub{text-align:left;line-height:1.5}
.header-sub span{font-size:.82rem;color:#6b5a80;font-weight:500;display:block}
main{padding:18px 14px 48px;max-width:480px;margin:0 auto}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:.12em;color:var(--muted);margin:20px 0 8px;text-transform:uppercase;padding-left:2px}
.card{display:block;text-decoration:none;background:#fff;border-radius:2px;padding:16px 18px;margin-bottom:10px;border:1.5px solid var(--lav-mid);position:relative;overflow:hidden;transition:transform .15s}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent,var(--lav-dark))}
.card:hover{transform:translateY(-2px)}
.card-row{display:flex;align-items:center;gap:12px}
.card-icon{display:none}
.card-meta{flex:1}
.card-title{font-size:.95rem;font-weight:700;color:var(--text)}
.card-desc{font-size:.75rem;color:var(--muted);margin-top:3px;line-height:1.5}
.card-arrow{color:var(--muted);font-size:1rem}
.card.user1{--accent:#c4aedd}.card.user2{--accent:#a89cd4}.card.user3{--accent:#9b59b6}
.card.staff1{--accent:#f9a03f}.card.staff2{--accent:#e74c3c}.card.staff3{--accent:#7a5c9a}
.btn-staff{display:block;text-align:center;margin-top:28px;padding:11px;font-size:.78rem;color:var(--muted);text-decoration:none;border:1px solid var(--lav-mid);border-radius:2px;background:#fff}
.btn-staff:hover{background:var(--lav-light)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-title">ひのきっこ</div>
    <div class="header-sub">
      <span>アンファンひのきさくら</span>
      <span>子育て支援センター</span>
    </div>
  </div>
</header>
<main>
  <div class="section-label">利用者向け</div>
  <a href="user_program.html" class="card user1">
    <div class="card-row">
      <div class="card-icon"></div>
      <div class="card-meta"><div class="card-title">プログラム別予約</div><div class="card-desc">参加したいプログラムを選んで空き確認・予約。スマホ向き。</div></div>
      <div class="card-arrow">›</div>
    </div>
  </a>
  <a href="user_calendar.html" class="card user2">
    <div class="card-row">
      <div class="card-icon"></div>
      <div class="card-meta"><div class="card-title">週カレンダー表示</div><div class="card-desc">今週の全プログラムを時間軸で一覧。「いつ来ようか」を決めるのに便利。</div></div>
      <div class="card-arrow">›</div>
    </div>
  </a>
  <a href="programs.html" class="card user3">
    <div class="card-row">
      <div class="card-icon"></div>
      <div class="card-meta"><div class="card-title">プログラム紹介</div><div class="card-desc">画像・テキスト・YouTube動画で各プログラムを詳しく紹介。</div></div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a href="register.html" class="card user1">
    <div class="card-row">
      <div class="card-icon"></div>
      <div class="card-meta"><div class="card-title">利用者登録・QR発行</div><div class="card-desc">初回登録フォーム。完了するとユニークQRコードが発行される。</div></div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a href="admin_top.html" class="btn-staff">スタッフ・管理者メニュー ›</a>
</main>
</body>
</html>
