// ─── ユーティリティ ───────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}
function calcMonths(dob) {
  if (!dob) return null;
  const d = new Date(dob), t = new Date();
  return (t.getFullYear()-d.getFullYear())*12 + (t.getMonth()-d.getMonth());
}
function timeStr() {
  return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}

// ─── グローバル状態 ───────────────────────────────────────────────
let STATE = {};
function resetState() {
  STATE = {
    checkinMode: true,
    todayBookings: [],
    selectedBooking: null,
    telInput: '',
    foundUser: null,
    guestProg: 'free'
  };
}
resetState();

// ─── 当日予約読み込み ─────────────────────────────────────────────
async function loadTodayBookings() {
  const today = todayStr();
  const snap = await getDocs(query(
    collection(db,'bookings'),
    where('date','==',today),
    where('status','in',['confirmed','pending'])
  ));
  const vSnap = await getDocs(query(
    collection(db,'visits'),
    where('date','==',today),
    where('exitAt','==',null)
  ));
  const checkedInUids = new Set(vSnap.docs.map(d => d.data().uid).filter(Boolean));
  STATE.todayBookings = snap.docs.map(d => ({
    id: d.id,
    ...d.data(),
    alreadyIn: checkedInUids.has(d.data().uid)
  }));
}

// ─── チェックイン（予約者） ────────────────────────────────────────
async function doCheckinByBooking(booking) {
  showLoading('チェックイン中…');
  try {
    const today = todayStr();
    let visitId;
    if (booking.uid) {
      const vSnap = await getDocs(query(
        collection(db,'visits'),
        where('uid','==',booking.uid),
        where('date','==',today),
        where('exitAt','==',null)
      ));
      if (!vSnap.empty) {
        visitId = vSnap.docs[0].id;
        const ex = vSnap.docs[0].data();
        const pn = [...(ex.progNames||[])];
        if (!pn.includes(booking.progName)) pn.push(booking.progName);
        await updateDoc(doc(db,'visits',visitId),{
          progNames: pn,
          bookingIds: [...(ex.bookingIds||[]), booking.id]
        });
      }
    }
    if (!visitId) {
      let childDob = '';
      let childMonths = null;
      if (booking.uid) {
        const uSnap = await getDoc(doc(db,'users',booking.uid));
        if (uSnap.exists()) {
          childDob = uSnap.data().childDob || '';
          childMonths = calcMonths(childDob);
        }
      }
      const isChildcare = booking.progId === 'tochi' || booking.tochi === true;
      const vRef = await addDoc(collection(db,'visits'),{
        uid: booking.uid || null,
        name: booking.name || '',
        childDob,
        childMonths,
        visitType: isChildcare ? 'childcare' : 'program',
        progNames: [booking.progName || booking.progId || ''],
        visitedAt: Timestamp.now(),
        date: today,
        exitAt: null,
        duration: null,
        bookingIds: [booking.id]
      });
      visitId = vRef.id;
    }
    await updateDoc(doc(db,'bookings',booking.id),{
      checkedIn: true, checkedInAt: Timestamp.now(), visitId
    });
    showResultIn({
      name: booking.name,
      progName: booking.progName || booking.progId || '',
      time: timeStr(),
      visitType: (booking.progId==='tochi'||booking.tochi) ? 'childcare' : 'program'
    });
  } catch(e) {
    console.error(e);
    showError('エラーが発生しました', e.message);
  }
}

// ─── チェックイン（電話番号検索後の会員） ─────────────────────────
async function doCheckinByUser(user) {
  showLoading('チェックイン中…');
  try {
    const today = todayStr();
    const vSnap = await getDocs(query(
      collection(db,'visits'),
      where('uid','==',user.uid),
      where('date','==',today),
      where('exitAt','==',null)
    ));
    if (!vSnap.empty) {
      showResultIn({ name: user.name, progName: '（本日すでに入室済み）', time: timeStr(), visitType: 'free', alreadyIn: true });
      return;
    }
    const bkSnap = await getDocs(query(
      collection(db,'bookings'),
      where('uid','==',user.uid),
      where('date','==',today),
      where('status','in',['confirmed','pending'])
    ));
    const bookings = bkSnap.docs.map(d=>({id:d.id,...d.data()}));
    const hasChildcare = bookings.some(b=>b.progId==='tochi'||b.tochi===true);
    const visitType = bookings.length>0 ? (hasChildcare?'childcare':'program') : 'free';
    const progNames = bookings.length>0 ? bookings.map(b=>b.progName||b.progId).filter(Boolean) : ['自由来所'];
    const vRef = await addDoc(collection(db,'visits'),{
      uid: user.uid,
      name: user.name||'',
      childDob: user.childDob||'',
      childMonths: calcMonths(user.childDob),
      visitType, progNames,
      visitedAt: Timestamp.now(),
      date: today,
      exitAt: null, duration: null,
      bookingIds: bookings.map(b=>b.id)
    });
    for (const bk of bookings) {
      await updateDoc(doc(db,'bookings',bk.id),{
        checkedIn:true, checkedInAt:Timestamp.now(), visitId:vRef.id
      });
    }
    showResultIn({ name: user.name, progName: progNames.join('・'), time: timeStr(), visitType });
  } catch(e) {
    console.error(e);
    showError('エラーが発生しました', e.message);
  }
}

// ─── チェックイン（ゲスト） ────────────────────────────────────────
async function doCheckinGuest(tel4) {
  showLoading('記録中…');
  try {
    const today = todayStr();
    await addDoc(collection(db,'visits'),{
      uid: null,
      name: '(' + tel4 + ')',
      tel4,
      childDob: '',
      childMonths: null,
      visitType: 'free',
      progNames: ['自由来所'],
      visitedAt: Timestamp.now(),
      date: today,
      exitAt: null, duration: null,
      bookingIds: [],
      isGuest: true,
      needsProfile: true
    });
    showResultIn({ name: 'ご来場の方（' + tel4 + '）', progName: '自由来所', time: timeStr(), visitType: 'free', isGuest: true });
  } catch(e) {
    console.error(e);
    showError('エラーが発生しました', e.message);
  }
}

// ─── チェックアウト ───────────────────────────────────────────────
async function doCheckout(visitId, visitData) {
  showLoading('退場記録中…');
  try {
    const exitAt = Timestamp.now();
    const duration = Math.round((exitAt.toMillis()-visitData.visitedAt.toMillis())/60000);
    await updateDoc(doc(db,'visits',visitId),{ exitAt, duration });
    showResultOut({ name: visitData.name, time: timeStr(), duration });
  } catch(e) {
    console.error(e);
    showError('エラーが発生しました', e.message);
  }
}

// ─── 電話番号下4桁検索 ────────────────────────────────────────────
async function searchByTel4(tel4) {
  const snap = await getDocs(collection(db,'users'));
  const matched = [];
  snap.forEach(d => {
    const data = d.data();
    const tel = (data.tel||'').replace(/[-\s]/g,'');
    if (tel.length >= 4 && tel.slice(-4) === tel4) {
      matched.push({ uid: d.id, ...data });
    }
  });
  return matched;
}

// ─── 在室中一覧 ───────────────────────────────────────────────────
async function loadActiveVisits() {
  const snap = await getDocs(query(
    collection(db,'visits'),
    where('date','==',todayStr()),
    where('exitAt','==',null)
  ));
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

// ─── 画面描画 ──────────────────────────────────────────────────────
// ═════════════════════════════════════════════════════════════════
function setScreen(html, cls) {
  const el = document.getElementById('screen');
  el.className = 'screen' + (cls ? ' ' + cls : '');
  el.innerHTML = html;
}
function showLoading(msg) {
  setScreen(
    '<div class="center-wrap"><div class="spin"></div>' +
    '<div class="big-text" style="margin-top:20px">' + msg + '</div></div>',
    'loading-screen'
  );
}

// ─── TOP ─────────────────────────────────────────────────────────
async function showTop() {
  resetState();
  setScreen('<div class="center-wrap"><div class="spin"></div></div>');
  await loadTodayBookings();
  const mode = STATE.checkinMode;
  setScreen(
    '<div class="top-wrap">' +
    '<div class="mode-row">' +
    '<button class="mode-btn' + (mode ? ' active-in' : '') + '" onclick="switchMode(true)">入室</button>' +
    '<button class="mode-btn' + (!mode ? ' active-out' : '') + '" onclick="switchMode(false)">退室</button>' +
    '</div>' +
    '<div class="top-title">' + (mode ? 'チェックイン' : 'チェックアウト') + '</div>' +
    '<div class="top-sub">' + (mode ? '今日の予約がある方はタップ' : '帰られる方はタップ') + '</div>' +
    '<button class="big-btn primary" onclick="showReservedList()">' +
    '<span class="btn-icon">' + (mode ? '📋' : '🏠') + '</span>' +
    '<span class="btn-label">' + (mode ? '予約あり　名前を選ぶ' : '在室中の方　名前を選ぶ') + '</span>' +
    '</button>' +
    (mode ?
      '<div class="divider"><span>予約なし・会員の方</span></div>' +
      '<button class="big-btn secondary" onclick="showTelInput()">' +
      '<span class="btn-icon">📞</span>' +
      '<span class="btn-label">電話番号（下4桁）で入室</span>' +
      '</button>' +
      '<div class="divider"><span>はじめての方</span></div>' +
      '<button class="big-btn ghost" onclick="showGuestInfo()">' +
      '<span class="btn-icon">🌿</span>' +
      '<span class="btn-label">はじめての方はこちら</span>' +
      '</button>'
    : '') +
    '</div>',
    'top-screen'
  );
}

// ─── 予約一覧 / 在室一覧 ─────────────────────────────────────────
async function showReservedList() {
  if (!STATE.checkinMode) {
    showLoading('在室中の方を確認中…');
    const visits = await loadActiveVisits();
    if (visits.length === 0) {
      setScreen(
        '<div class="center-wrap">' +
        '<div style="font-size:3rem">🏠</div>' +
        '<div class="big-text" style="margin-top:12px">在室中の方はいません</div>' +
        '<button class="back-btn" onclick="showTop()">← 戻る</button>' +
        '</div>'
      );
      return;
    }
    const items = visits.map(function(v) {
      const progs = (v.progNames||[]).join('・') || '自由来所';
      const t = v.visitedAt ? v.visitedAt.toDate().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '';
      return '<button class="name-card" onclick="window._doCheckout(\'' + v.id + '\')">' +
        '<span class="name-main">' + (v.name||'（名前なし）') + '</span>' +
        '<span class="name-sub">' + progs + '　入室 ' + t + '</span>' +
        '</button>';
    }).join('');
    setScreen(
      '<div class="list-wrap">' +
      '<div class="list-title">退室する方を選んでください</div>' +
      '<div class="name-list">' + items + '</div>' +
      '<button class="back-btn" onclick="showTop()">← 戻る</button>' +
      '</div>'
    );
    window._doCheckout = async function(visitId) {
      showLoading('記録中…');
      const snap = await getDocs(query(
        collection(db,'visits'),
        where('date','==',todayStr()),
        where('exitAt','==',null)
      ));
      const vDoc = snap.docs.find(function(d){ return d.id===visitId; });
      if (vDoc) {
        await doCheckout(vDoc.id, vDoc.data());
      } else {
        showError('記録が見つかりません','再度お試しください');
      }
    };
    return;
  }

  // 入室モード
  const bks = STATE.todayBookings;
  if (bks.length === 0) {
    setScreen(
      '<div class="center-wrap">' +
      '<div style="font-size:3rem">📭</div>' +
      '<div class="big-text" style="margin-top:12px">本日の予約はありません</div>' +
      '<button class="back-btn" onclick="showTop()">← 戻る</button>' +
      '</div>'
    );
    return;
  }
  const items = bks.map(function(b, i) {
    const prog = b.progName || b.progId || '';
    const already = b.alreadyIn;
    return '<button class="name-card' + (already ? ' already-in' : '') + '" onclick="window._selectBooking(' + i + ')">' +
      '<span class="name-main">' + (b.name||'（名前なし）') + '</span>' +
      '<span class="name-sub">' + prog + (b.time ? '　' + b.time : '') + '</span>' +
      (already ? '<span class="badge-in">入室済</span>' : '') +
      '</button>';
  }).join('');
  setScreen(
    '<div class="list-wrap">' +
    '<div class="list-title">入室する方を選んでください</div>' +
    '<div class="name-list">' + items + '</div>' +
    '<button class="back-btn" onclick="showTop()">← 戻る</button>' +
    '</div>'
  );
  window._selectBooking = function(idx) {
    const b = STATE.todayBookings[idx];
    if (!b) return;
    STATE.selectedBooking = b;
    window._confirmCheckin = function() { doCheckinByBooking(STATE.selectedBooking); };
    if (b.alreadyIn) {
      setScreen(
        '<div class="center-wrap">' +
        '<div style="font-size:3rem">✅</div>' +
        '<div class="big-text" style="margin-top:12px">' + b.name + ' さん</div>' +
        '<div class="confirm-prog">すでに入室済みです</div>' +
        '<button class="back-btn" onclick="showReservedList()">← 戻る</button>' +
        '</div>',
        'confirm-screen'
      );
    } else {
      const prog = b.progName || b.progId || '';
      setScreen(
        '<div class="center-wrap">' +
        '<div style="font-size:3rem">👋</div>' +
        '<div class="big-text" style="margin-top:12px">' + b.name + ' さん</div>' +
        '<div class="confirm-prog">' + prog + (b.time ? '　' + b.time : '') + '</div>' +
        '<div class="confirm-row">この方でチェックインしますか？</div>' +
        '<div class="btn-row">' +
        '<button class="big-btn primary" onclick="window._confirmCheckin()">入室する</button>' +
        '<button class="big-btn ghost" onclick="showReservedList()">← 戻る</button>' +
        '</div></div>',
        'confirm-screen'
      );
    }
  };
}

// ─── 電話番号入力 ─────────────────────────────────────────────────
function showTelInput() {
  STATE.telInput = '';
  renderTelInput();
}
function renderTelInput() {
  const d = STATE.telInput;
  const disp = (d + '----').slice(0,4).split('').map(function(c){ return c==='-' ? '＿' : c; }).join('　');
  setScreen(
    '<div class="center-wrap tel-wrap">' +
    '<div class="tel-title">電話番号の<br>下4桁を入力</div>' +
    '<div class="tel-display">' + disp + '</div>' +
    '<div class="numpad">' +
    [1,2,3,4,5,6,7,8,9,'sp',0,'del'].map(function(k) {
      if (k==='sp') return '<div></div>';
      if (k==='del') return '<button class="num-key del-key" onclick="telBack()">⌫</button>';
      return '<button class="num-key" onclick="telInput(' + k + ')">' + k + '</button>';
    }).join('') +
    '</div>' +
    '<button class="back-btn" onclick="showTop()">← 戻る</button>' +
    '</div>',
    'tel-screen'
  );
}
window.telInput = function(n) {
  if (STATE.telInput.length >= 4) return;
  STATE.telInput += String(n);
  if (STATE.telInput.length === 4) {
    searchAndShowTelResult();
  } else {
    renderTelInput();
  }
};
window.telBack = function() {
  STATE.telInput = STATE.telInput.slice(0,-1);
  renderTelInput();
};
async function searchAndShowTelResult() {
  showLoading('検索中…');
  const matches = await searchByTel4(STATE.telInput);
  if (matches.length === 0) {
    setScreen(
      '<div class="center-wrap">' +
      '<div style="font-size:3rem">🔍</div>' +
      '<div class="big-text" style="margin-top:12px">登録が見つかりませんでした</div>' +
      '<div class="confirm-row">はじめての方はご登録をお願いします</div>' +
      '<div class="btn-row">' +
      '<button class="big-btn primary" onclick="showGuestInfo()">はじめての方はこちら</button>' +
      '<button class="big-btn ghost" onclick="showTelInput()">← 入力し直す</button>' +
      '</div></div>',
      'confirm-screen'
    );
  } else if (matches.length === 1) {
    showTelConfirm(matches[0]);
  } else {
    const items = matches.map(function(u,i) {
      const tel = (u.tel||'').replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
      return '<button class="name-card" onclick="window._pickUser(' + i + ')">' +
        '<span class="name-main">' + (u.name||u.kana||'（名前なし）') + '</span>' +
        '<span class="name-sub">' + tel + '</span>' +
        '</button>';
    }).join('');
    setScreen(
      '<div class="list-wrap">' +
      '<div class="list-title">該当する方を選んでください</div>' +
      '<div class="name-list">' + items + '</div>' +
      '<button class="back-btn" onclick="showTelInput()">← 戻る</button>' +
      '</div>'
    );
    window._pickUser = function(i) { showTelConfirm(matches[i]); };
  }
}
function showTelConfirm(user) {
  STATE.foundUser = user;
  setScreen(
    '<div class="center-wrap">' +
    '<div style="font-size:3rem">👤</div>' +
    '<div class="big-text" style="margin-top:12px">' + (user.name||user.kana||'（名前なし）') + ' さん</div>' +
    '<div class="confirm-row">この方でよろしいですか？</div>' +
    '<div class="btn-row">' +
    '<button class="big-btn primary" onclick="doCheckinByUser(STATE.foundUser)">入室する</button>' +
    '<button class="big-btn ghost" onclick="showTelInput()">← 番号を入力し直す</button>' +
    '</div></div>',
    'confirm-screen'
  );
}

    '<div class="tel-display">' + disp + '</div>' +

window.guestTelInput = function(n) {
  if (STATE.telInput.length >= 4) return;
  STATE.telInput += String(n);
  if (STATE.telInput.length === 4) {
    doCheckinGuest(STATE.telInput);
  } else {
    renderGuestTel();
  }
};
window.guestTelBack = function() {
  STATE.telInput = STATE.telInput.slice(0,-1);
  renderGuestTel();
};

// ─── 結果画面（入室） ─────────────────────────────────────────────
function showResultIn(opt) {
  const typeMap = { program:'プログラム参加', childcare:'託児ルーム', free:'自由遊び' };
  const typeLabel = typeMap[opt.visitType] || '自由遊び';
  setScreen(
    '<div class="center-wrap result-wrap">' +
    '<div class="result-icon">✅</div>' +
    '<div class="result-name">ようこそ！<br>' + opt.name + ' さん</div>' +
    '<div class="result-prog">' + opt.progName + '</div>' +
    '<div class="result-meta">' + typeLabel + '　入室 ' + opt.time + '</div>' +
    (opt.alreadyIn ? '<div class="result-note">（本日すでに入室記録があります）</div>' : '') +
    (opt.isGuest ?
      '<div class="guest-prompt">LINEで会員登録すると次回から電話番号で入室できます ✨<br><span style="font-size:.78rem;opacity:.75">リッチメニュー「会員QR」から登録　→ 詳細・月齢もそちらで入力できます</span></div>'
    : '') +
    '<div class="result-countdown" id="countdown">5秒後に戻ります…</div>' +
    '</div>',
    'result-screen'
  );
  startCountdown();
}

// ─── 結果画面（退室） ─────────────────────────────────────────────
function showResultOut(opt) {
  setScreen(
    '<div class="center-wrap result-wrap">' +
    '<div class="result-icon">👋</div>' +
    '<div class="result-name">' + opt.name + ' さん<br>またね！</div>' +
    '<div class="result-meta">退室 ' + opt.time + '　滞在 ' + opt.duration + '分</div>' +
    '<div class="result-countdown" id="countdown">5秒後に戻ります…</div>' +
    '</div>',
    'result-out-screen'
  );
  startCountdown();
}

function startCountdown() {
  let sec = 5;
  const t = setInterval(function() {
    sec--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = sec + '秒後に戻ります…';
    if (sec <= 0) { clearInterval(t); showTop(); }
  }, 1000);
}

function showError(msg, sub) {
  setScreen(
    '<div class="center-wrap">' +
    '<div style="font-size:3rem">⚠️</div>' +
    '<div class="big-text" style="margin-top:12px">' + msg + '</div>' +
    (sub ? '<div style="font-size:.8rem;opacity:.7;margin-top:8px">' + sub + '</div>' : '') +
    '<button class="back-btn" style="margin-top:24px" onclick="showTop()">← 戻る</button>' +
    '</div>',
    'error-screen'
  );
}

// ─── グローバル公開 ───────────────────────────────────────────────
window.switchMode = function(isIn) { STATE.checkinMode = isIn; showTop(); };
window.showTop = showTop;
window.showReservedList = showReservedList;
window.showTelInput = showTelInput;
window.showGuestInfo = showGuestInfo;
window.doCheckinByBooking = doCheckinByBooking;
window.doCheckinByUser = doCheckinByUser;
window.STATE = STATE;

window.addEventListener('load', function() { showTop(); });
</script>
