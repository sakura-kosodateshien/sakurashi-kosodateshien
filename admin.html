  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1EvrPURepmXG_G4NZcin5iHf0qmw-Zpw",
    authDomain: "sakurashi-kosodateshien.firebaseapp.com",
    projectId: "sakurashi-kosodateshien",
    storageBucket: "sakurashi-kosodateshien.firebasestorage.app",
    messagingSenderId: "365529893548",

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const PASS = 'hinoki2026';

  // ── ログイン ────────────────────────────────────────────────────────
  window.doLogin = function() {
    if (document.getElementById('passInput').value === PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display  = 'block';
      loadData();
      loadChanges();
      loadMembers();

      document.getElementById('loginErr').textContent = 'パスワードが違います';

  // ── データ読み込み ────────────────────────────────────────────────
  async function loadData() {
    const year  = parseInt(document.getElementById('selYear').value);
    const month = parseInt(document.getElementById('selMonth').value);

    const start = new Date(year, month - 1, 1);
    const end   = new Date(year, month, 1);

    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('results').style.display    = 'none';

    try {
      const q = query(
        collection(db, 'visits'),
        where('visitedAt', '>=', Timestamp.fromDate(start)),
        where('visitedAt', '<',  Timestamp.fromDate(end)),
        orderBy('visitedAt', 'asc')
      );
      const snap = await getDocs(q);
      const visits = snap.docs.map(d => d.data());
      renderResults(visits, year, month);
    } catch(e) {
      alert('データの取得に失敗しました: ' + e.message);
    }

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('results').style.display    = 'block';
  }
  window.loadData = loadData;

  // ── 集計・描画 ────────────────────────────────────────────────────
  function renderResults(visits, year, month) {
    // 集計
    const counts = { free: 0, program: 0, childcare: 0 };
    const byDate  = {};

    visits.forEach(v => {
      counts[v.visitType] = (counts[v.visitType] || 0) + 1;
      const d = v.date || v.visitedAt.toDate().toLocaleDateString('ja-JP',
        {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
      if (!byDate[d]) byDate[d] = { free:0, program:0, childcare:0 };
      byDate[d][v.visitType]++;
    });

    const total = visits.length;

    // サマリーカード更新
    document.getElementById('cntTotal').textContent    = total;
    document.getElementById('cntFree').textContent     = counts.free     || 0;
    document.getElementById('cntProgram').textContent  = counts.program  || 0;
    document.getElementById('cntChildcare').textContent= counts.childcare|| 0;

    // 日別テーブル
    const tbody = document.getElementById('dailyTbody');
    tbody.innerHTML = '';
    Object.keys(byDate).sort().forEach(date => {
      const row = byDate[date];
      const tr  = document.createElement('tr');
      const d   = new Date(date);
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      tr.innerHTML = `
        <td>${date.slice(5)} (${dow})</td>
        <td class="num">${row.program  || ''}</td>
        <td class="num">${row.childcare|| ''}</td>
        <td class="num">${row.free     || ''}</td>
        <td class="num tot">${(row.free||0)+(row.program||0)+(row.childcare||0)}</td>`;
      tbody.appendChild(tr);
    });

    // 合計行
    const tfoot = document.getElementById('dailyTfoot');
    tfoot.innerHTML = `<tr class="foot-row">
      <td>月　計</td>
      <td class="num">${counts.program  ||0}</td>
      <td class="num">${counts.childcare||0}</td>
      <td class="num">${counts.free     ||0}</td>
      <td class="num tot">${total}</td>
    </tr>`;

    // 市報告用テキスト生成
    document.getElementById('reportText').value =
`【市報告用】${year}年${month}月分
─────────────────────────────
支援プログラム参加者数：${counts.program  || 0} 人
託児利用者数          ：${counts.childcare|| 0} 人
自由来所者数          ：${counts.free     || 0} 人
合　計                ：${total} 人
─────────────────────────────
（陽の木さくら保育園 子育て支援センター）`;
  }

  // ── CSV出力 ──────────────────────────────────────────────────────
  window.exportCSV = async function() {
    const year  = parseInt(document.getElementById('selYear').value);
    const month = parseInt(document.getElementById('selMonth').value);
    const start = new Date(year, month - 1, 1);
    const end   = new Date(year, month, 1);

    const q = query(
      collection(db, 'visits'),
      where('visitedAt', '>=', Timestamp.fromDate(start)),
      where('visitedAt', '<',  Timestamp.fromDate(end)),
      orderBy('visitedAt', 'asc')
    );
    const snap   = await getDocs(q);
    const visits = snap.docs.map(d => d.data());

    const typeLabel = { free:'自由来所', program:'支援プログラム', childcare:'託児' };
    const rows = [['日付','時刻','氏名','利用区分','お子さん生年月日']];
    visits.forEach(v => {
      const dt = v.visitedAt.toDate();
      rows.push([
        dt.toLocaleDateString('ja-JP'),
        dt.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}),
        v.name,
        typeLabel[v.visitType] || v.visitType,
        v.childDob || ''
      ]);
    });

    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `来場記録_${year}年${month}月.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── 会員一覧 ──────────────────────────────────────────────────────
  let allMembers = [];

  async function loadMembers(){
    try{
      const snap = await getDocs(collection(db,'users'));
      allMembers = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(a.kana||a.name||'').localeCompare(b.kana||b.name||'','ja'));
      renderMembers(allMembers);
    }catch(e){
      document.getElementById('memberList').innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.85rem">読み込みエラー: '+e.message+'</div>';
    }
  }

  function calcMonths(dob){
    if(!dob) return '-';
    const d=new Date(dob),t=new Date();
    return (t.getFullYear()-d.getFullYear())*12+(t.getMonth()-d.getMonth())+'ヶ月';
  }

  function renderMembers(members){
    document.getElementById('memberCount').textContent = members.length+'名';
    if(!members.length){
      document.getElementById('memberList').innerHTML =
        '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.85rem">該当する会員がいません</div>';
      return;
    }
    document.getElementById('memberList').innerHTML = members.map((u,i)=>`
      <div class="member-row" id="mrow-${u.id}">
        <div class="member-num">${i+1}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:6px">
            <span class="member-name">${u.name||'-'}</span>
            <span class="member-kana">${u.kana||''}</span>
          </div>
          <div class="member-info">
            📱 ${u.tel||'-'}　
            👶 ${calcMonths(u.childDob)}　
            📅 登録：${u.registeredAt ? new Date(u.registeredAt).toLocaleDateString('ja-JP') : '-'}
          </div>
        </div>
        <span class="member-badge ${u.lineUserId?'':'no-line'}">${u.lineUserId?'✅ LINE連携':'未連携'}</span>
        <button onclick="showMemberBookings('${u.id}','${(u.name||'').replace(/'/g,'')}','${(u.tel||'').replace(/'/g,'')}')" style="margin-left:8px;padding:4px 10px;border-radius:8px;border:1.5px solid #c9b8e0;background:#ede6f4;font-size:.72rem;cursor:pointer;font-family:inherit;color:#5a3f78">📋 予約</button>
        <button onclick="editMember('${u.id}')" style="margin-left:4px;padding:4px 10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:.72rem;cursor:pointer;font-family:inherit;color:var(--green)">✏️ 編集</button>
        <button onclick="deleteMember('${u.id}','${(u.name||'').replace(/'/g,'')}')" style="margin-left:4px;padding:4px 10px;border-radius:8px;border:1.5px solid #fce4ec;background:#fff;font-size:.72rem;cursor:pointer;font-family:inherit;color:#c62828">🗑 削除</button>
      </div>`).join('');
  }

  // ── 会員削除 ────────────────────────────────────────────────────────
  window.deleteMember = async function(uid, name){
    if(!confirm(`「${name}」さんの会員情報を削除しますか？\nこの操作は元に戻せません。`)) return;
    try{
      await deleteDoc(doc(db,'users',uid));
      allMembers = allMembers.filter(u=>u.id!==uid);
      renderMembers(allMembers);
      alert('削除しました');
    }catch(e){ alert('削除エラー: '+e.message); }
  };

  // ── 会員別予約一覧 ──────────────────────────────────────────────────
  window.showMemberBookings = async function(uid, name, tel){
    document.getElementById('bookingModalName').textContent = name + ' さんの予約一覧';
    document.getElementById('bookingModalList').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.85rem">読み込み中...</div>';
    document.getElementById('bookingModal').style.display = 'flex';
    try{
      const snap = await getDocs(query(
        collection(db,'bookings'),
        where('tel','==',tel)
      ));
      // クライアント側でdateソート（Firestoreインデックス不要）
      const bookings = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      if(!bookings.length){
        document.getElementById('bookingModalList').innerHTML =
          '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.85rem">予約がありません</div>';
        return;
      }
      const statusLabel = {confirmed:'✅ 予約確定', pending:'⏳ 確認中', cancelled:'❌ キャンセル'};
      const statusColor = {confirmed:'#e8f5e9', pending:'#fff8e1', cancelled:'#fce4ec'};
      const statusText  = {confirmed:'#2d6a4f', pending:'#7d5a00', cancelled:'#c62828'};
      document.getElementById('bookingModalList').innerHTML = bookings.map(b=>{
        const st = b.status||'pending';
        return `<div style="border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fafafa">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <div style="font-weight:700;font-size:.9rem;color:var(--text)">${b.progName||b.progId||'-'}</div>
            <span style="font-size:.72rem;padding:3px 9px;border-radius:20px;font-weight:700;background:${statusColor[st]};color:${statusText[st]}">${statusLabel[st]||st}</span>
          </div>
          <div style="font-size:.8rem;color:var(--muted);line-height:1.8">
            📅 ${b.dateLabel||b.date||'-'}　${b.time||''}
            ${b.childName ? '<br>👶 お子さんの名前：' + b.childName : ''}
            ${b.note ? '<br>📝 ' + b.note : ''}
          </div>
        </div>`;
      }).join('');
    }catch(e){
      document.getElementById('bookingModalList').innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.85rem">読み込みエラー: '+e.message+'</div>';
    }
  };

  window.closeBookingModal = function(){
    document.getElementById('bookingModal').style.display = 'none';
  };

  // ── 会員編集 ────────────────────────────────────────────────────────
  window.editMember = function(uid){
    const u = allMembers.find(x=>x.id===uid);
    if(!u) return;
    document.getElementById('editUid').value  = uid;
    document.getElementById('editName').value = u.name||'';
    document.getElementById('editKana').value = u.kana||'';
    document.getElementById('editTel').value  = u.tel||'';
    document.getElementById('editDob').value  = u.childDob||'';
    document.getElementById('editModal').style.display = 'flex';
  };

  window.closeEditModal = function(){
    document.getElementById('editModal').style.display = 'none';
  };

  window.saveMember = async function(){
    const uid  = document.getElementById('editUid').value;
    const name = document.getElementById('editName').value.trim();
    const kana = document.getElementById('editKana').value.trim();
    const tel  = document.getElementById('editTel').value.trim();
    const dob  = document.getElementById('editDob').value.trim();
    if(!name){ alert('氏名を入力してください'); return; }
    try{
      await updateDoc(doc(db,'users',uid),{name,kana,tel,childDob:dob});
      const idx = allMembers.findIndex(u=>u.id===uid);
      if(idx>=0) allMembers[idx]={...allMembers[idx],name,kana,tel,childDob:dob};
      renderMembers(allMembers);
      closeEditModal();
      alert('更新しました');
    }catch(e){ alert('更新エラー: '+e.message); }
  };

  window.filterMembers = function(){
    const q = document.getElementById('memberSearch').value.trim().toLowerCase();
    if(!q){ renderMembers(allMembers); return; }
    const filtered = allMembers.filter(u=>
      (u.name||'').toLowerCase().includes(q) ||
      (u.kana||'').toLowerCase().includes(q) ||
      (u.tel||'').replace(/-/g,'').includes(q.replace(/-/g,''))
    );
    renderMembers(filtered);
  };

  window.exportMemberCSV = function(){
    const rows = [['氏名','ふりがな','電話番号','子どもの生年月日','月齢','LINE連携','登録日']];
    allMembers.forEach(u=>{
      rows.push([
        u.name||'', u.kana||'', u.tel||'', u.childDob||'',
        calcMonths(u.childDob),
        u.lineUserId?'済':'未',
        u.registeredAt ? new Date(u.registeredAt).toLocaleDateString('ja-JP') : ''
      ]);
    });
    const csv = '\uFEFF' + rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='会員一覧.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  // ── 変更管理 ──────────────────────────────────────────────────────

  // 4月プログラム一覧（変更対象選択用）
  const PROG_LIST = [
    {id:"w1-lunch-mon",  label:"4/6（月）ランチひろば"},
    {id:"w1-eigo-tue",   label:"4/7（火）英語 7か月〜1才"},
    {id:"w1-lunch-wed",  label:"4/8（水）ランチひろば"},
    {id:"w1-chiku-thu",  label:"4/9（木）知育 7か月〜1才"},
    {id:"w1-oyatsu-thu", label:"4/9（木）おやつ"},
    {id:"w1-niwa-fri",   label:"4/10（金）園庭遊び"},
    {id:"w2-massage-mon",label:"4/13（月）ベビーマッサージ"},
    {id:"w2-hattatsu-mon",label:"4/13（月）発達相談"},
    {id:"w2-eigo-tue",   label:"4/14（火）英語 1才〜3才"},
    {id:"w2-pulapan-wed",label:"4/15（水）プラパン工房"},
    {id:"w2-chiku-thu",  label:"4/16（木）知育 1才〜3才"},
    {id:"w2-tanjou-fri", label:"4/17（金）お誕生日会"},
    {id:"w3-photo-mon",  label:"4/20（月）ベビーフォト"},
    {id:"w3-lunch-tue",  label:"4/21（火）ランチひろば"},
    {id:"w3-yoga-wed",   label:"4/22（水）リラックスヨガ"},
    {id:"w3-lunch-thu",  label:"4/23（木）ランチひろば"},
    {id:"w3-niwa-fri",   label:"4/24（金）園庭遊び"},
    {id:"w4-photo-mon",  label:"4/27（月）ベビーフォト"},
    {id:"w4-hattatsu-mon",label:"4/27（月）発達相談"},
    {id:"w4-oyatsu-mon", label:"4/27（月）おやつ"},
    {id:"w4-massage-tue",label:"4/28（火）ベビーマッサージ"},
  ];

  // 変更タイプに応じた追加入力欄の切り替え
  window.onChangeType = function(){
    const t = document.getElementById('chgType').value;
    document.getElementById('chgTimeRow').style.display  = t==='time'  ? 'flex'  : 'none';
    document.getElementById('chgCapRow').style.display   = t==='cap'   ? 'flex'  : 'none';
    document.getElementById('chgAddRow').style.display   = t==='add'   ? 'block' : 'none';
    document.getElementById('chgBlockRow').style.display = t==='block' ? 'block' : 'none';
    // ブロックの場合は対象をtochi固定に
    if(t==='block'){
      const sel = document.getElementById('chgTarget');
      // tochi系のIDを探して選択
      for(let o of sel.options){
        if(o.value.includes('tochi') || o.text.includes('託児')){
          sel.value = o.value; break;
        }
      }
    }
  };

  // 変更を登録
  window.saveChange = async function(){
    const targetId = document.getElementById('chgTarget').value;
    const type     = document.getElementById('chgType').value;
    const note     = document.getElementById('chgNote').value.trim();

    if(!targetId){ alert('対象プログラムを選択してください'); return; }
    if(!type)    { alert('変更種別を選択してください'); return; }

    const data = {
      targetId,
      targetLabel: PROG_LIST.find(p=>p.id===targetId)?.label || targetId,
      type, note,
      createdAt: Timestamp.now()
    };

    if(type==='time'){
      data.newTime = document.getElementById('chgNewTime').value.trim();
      if(!data.newTime){ alert('新しい時間を入力してください'); return; }
    }
    if(type==='cap'){
      data.newCap = parseInt(document.getElementById('chgNewCap').value);
      if(isNaN(data.newCap)){ alert('新しい定員を入力してください'); return; }
    }
    if(type==='add'){
      data.newSlot = {
        date: document.getElementById('chgAddDate').value,
        time: document.getElementById('chgAddTime').value,
      };
      if(!data.newSlot.date||!data.newSlot.time){ alert('追加日程を入力してください'); return; }
    }
    if(type==='block'){
      data.blockDate = document.getElementById('chgBlockDate').value.trim();
      data.blockTime = document.getElementById('chgBlockTime').value.trim();
      // ブロックは対象IDを「tochi-block」として保存
      data.targetId = 'tochi';
      data.targetLabel = data.blockDate
        ? (data.blockDate + ' 託児ブロック')
        : '託児ルーム 全日ブロック';
    }

    const btn = document.getElementById('chgSaveBtn');
    btn.disabled=true; btn.textContent='登録中…';
    try{
      await addDoc(collection(db,'changes'), data);
      alert('登録しました。予約画面・管理画面に即反映されます。');
      document.getElementById('chgForm').reset();
      onChangeType();
      loadChanges();
    }catch(e){
      alert('登録に失敗しました: '+e.message);
    }finally{
      btn.disabled=false; btn.textContent='変更を登録する';
    }
  };

  // 変更一覧を読み込む
  async function loadChanges(){
    try{
      const snap = await getDocs(collection(db,'changes'));
      const changes = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

      if(!changes.length){
        document.getElementById('chgList').innerHTML=
          '<div style="color:var(--muted);font-size:.85rem;padding:12px 0">登録された変更はありません</div>';
        return;
      }

      const typeLabel = {cancel:'⚠️ 中止', time:'🔔 時間変更', cap:'👥 定員変更', add:'🆕 追加', block:'🚫 日程ブロック'};
      const typeBadge = {cancel:'badge-cancel', time:'badge-change', cap:'badge-cap', add:'badge-add', block:'badge-block'};

      document.getElementById('chgList').innerHTML = changes.map(c=>`
        <div class="chg-card">
          <div class="chg-head">
            <span class="chg-badge ${typeBadge[c.type]||''}">${typeLabel[c.type]||c.type}</span>
            <span class="chg-prog">${c.targetLabel||c.targetId}</span>
            <button class="chg-del" onclick="deleteChange('${c.id}')">削除</button>
          </div>
          ${c.newTime   ? `<div class="chg-detail">新しい時間：${c.newTime}</div>` : ''}
          ${c.newCap    ? `<div class="chg-detail">新しい定員：${c.newCap}組</div>` : ''}
          ${c.newSlot   ? `<div class="chg-detail">追加日程：${c.newSlot.date}　${c.newSlot.time}</div>` : ''}
          ${c.blockDate ? `<div class="chg-detail">ブロック日：${c.blockDate}</div>` : ''}
          ${c.blockTime ? `<div class="chg-detail">ブロック時間：${c.blockTime}</div>` : ''}
          ${c.note      ? `<div class="chg-detail">📝 ${c.note}</div>` : ''}
          <div class="chg-notify" id="notify-${c.id}">
            <button class="btn-notify" onclick="showNotifyText('${c.id}')">📢 通知文を生成</button>
          </div>
          <div class="notify-text" id="notifyText-${c.id}" style="display:none"></div>
        </div>`).join('');
    }catch(e){
      document.getElementById('chgList').innerHTML=
        '<div style="color:#c0392b;font-size:.85rem">読み込みエラー: '+e.message+'</div>';
    }
  }

  // 変更削除
  window.deleteChange = async function(id){
    if(!confirm('この変更を削除しますか？\n削除すると予約画面・管理画面の表示も元に戻ります。')) return;
    try{
      await deleteDoc(doc(db,'changes',id));
      loadChanges();
    }catch(e){ alert('削除に失敗しました: '+e.message); }
  };

  // 通知文生成
  window.showNotifyText = function(id){
    const el = document.getElementById('notifyText-'+id);
    const card = el.closest('.chg-card');
    const badge = card.querySelector('.chg-badge').textContent;
    const prog  = card.querySelector('.chg-prog').textContent;
    const detail= [...card.querySelectorAll('.chg-detail')].map(d=>d.textContent).join('\n');

    const text = `【お知らせ】プログラム変更のご連絡\n\n${prog} に変更があります。\n\n${badge}\n${detail}\n\nご不便をおかけして申し訳ございません。\nご不明な点はお電話（043-310-5757）またはLINEにてお問い合わせください。\n\nひのきっこ子育て支援センター`;

    el.style.display = el.style.display==='none' ? 'block' : 'none';
    el.textContent = text;
  };

  // ── 初期値セット ────────────────────────────────────────────────
  window.addEventListener('load', () => {
    const now = new Date();
    document.getElementById('selYear').value  = now.getFullYear();
    document.getElementById('selMonth').value = now.getMonth() + 1;

    // プログラム選択肢を生成
    const sel = document.getElementById('chgTarget');
    PROG_LIST.forEach(p=>{
      const o = document.createElement('option');
      o.value=p.id; o.textContent=p.label;
      sel.appendChild(o);
    });
  });
</script>

<script>
function switchMainTab(tab, el){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}

// 通知文タップでコピー
document.addEventListener('click', e=>{
  if(e.target.classList.contains('notify-text')){
    navigator.clipboard.writeText(e.target.textContent.replace(' （タップでコピー）',''))
      .then(()=>{ e.target.style.background='#d4edda'; setTimeout(()=>e.target.style.background='',1200); })
      .catch(()=>{ alert('コピーに失敗しました'); });
  }
});
</script>

    <div style="display:flex;gap:10px">
      <button onclick="closeEditModal()" style="flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:.88rem;font-family:inherit;cursor:pointer;color:var(--muted)">キャンセル</button>
      <button onclick="saveMember()" style="flex:2;padding:11px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer">保存する</button>
    </div>
  </div>
</div>

</body>
</html>
