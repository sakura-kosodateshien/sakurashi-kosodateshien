<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員証 | ひのきっこ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#fdf8f2;min-height:100vh;color:#1a2e22}
header{background:#2d6a4f;padding:16px 20px;text-align:center}
header .en{font-size:.68rem;letter-spacing:.2em;color:rgba(255,255,255,.45);margin-bottom:4px}
header h1{color:#fff;font-size:1rem;font-weight:700}
.wrap{width:min(380px,92vw);margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px}
.icon{font-size:2.4rem;text-align:center;margin-bottom:12px}
.msg{font-size:.95rem;text-align:center;margin-bottom:8px;font-weight:700}
.sub{font-size:.82rem;color:#6b8f71;text-align:center;line-height:1.6;margin-bottom:20px}
.btn{display:block;width:100%;padding:13px;background:#2d6a4f;color:#fff;border:none;border-radius:12px;font-size:.92rem;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;text-align:center;margin-bottom:8px}
.btn-sub{display:block;width:100%;padding:11px;background:#fff;color:#6b8f71;border:1px solid #dceee2;border-radius:12px;font-size:.85rem;font-family:inherit;cursor:pointer;text-decoration:none;text-align:center;margin-bottom:8px}
.divider{border-top:1px solid #dceee2;margin:16px 0}
.small{font-size:.76rem;color:#6b8f71;text-align:center;margin-bottom:10px}
#loading{text-align:center;padding:40px 20px;color:#6b8f71}
#memberCard{display:none}
#qrArea{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px}
#qrcode{background:#fff;padding:14px;border-radius:12px;border:1.5px solid #dceee2}
.qr-note{background:#f0faf4;border-radius:10px;padding:10px 14px;font-size:.76rem;color:#6b8f71;line-height:1.7;width:100%;text-align:center}
.member-name{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:4px}
.member-uid{font-size:.68rem;color:#6b8f71;text-align:center;margin-bottom:16px;font-family:monospace}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #dceee2;font-size:.84rem}
.info-row:last-child{border-bottom:none}
.info-label{color:#6b8f71;font-size:.76rem}
/* モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px}
.modal h3{font-size:.95rem;font-weight:700;margin-bottom:8px}
.modal p{font-size:.82rem;color:#6b8f71;margin-bottom:16px;line-height:1.6}
.modal input{width:100%;padding:10px 12px;border:1.5px solid #dceee2;border-radius:10px;font-size:.9rem;font-family:inherit;margin-bottom:12px;outline:none}
.modal-actions{display:flex;gap:8px}
.btn-cancel-modal{flex:1;padding:11px;border:1px solid #dceee2;border-radius:10px;background:#fff;font-family:inherit;font-size:.88rem;cursor:pointer;color:#6b8f71}
.btn-ok-modal{flex:2;padding:11px;border:none;border-radius:10px;background:#2d6a4f;color:#fff;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer}
#errMsg{color:#c62828;font-size:.82rem;text-align:center;margin-top:8px}
</style>
</head>
<body>
<header>
  <div class="en">HINOKI SAKURA · MEMBER CARD</div>
  <h1>🌿 ひのきっこ 会員証</h1>
</header>

<div class="wrap">
  <!-- ローディング -->
  <div id="loading">読み込み中…</div>

  <!-- 会員証 -->
  <div id="memberCard">
    <div class="card">
      <div class="member-name" id="mName"></div>
      <div class="member-uid" id="mUid"></div>
      <div id="qrArea">
        <div id="qrcode"></div>
        <div class="qr-note">センター受付のタブレットにかざしてください</div>
      </div>
      <div id="memberInfo"></div>
    </div>
  </div>

  <!-- 未登録 -->
  <div id="unregCard" style="display:none">
    <div class="card">
      <div class="icon">🌱</div>
      <div class="msg">まだ会員登録されていません</div>
      <div class="sub">登録すると次回からQRコードをかざすだけでチェックインできます</div>
      <a href="https://liff.line.me/2009587361-fY64rJtv" class="btn">無料で会員登録する</a>
      <div class="divider"></div>
      <div class="small">すでに登録済みの方はこちら</div>
      <button class="btn-sub" onclick="openLinkModal()">📱 電話番号でLINEと紐づける</button>
      <div id="errMsg"></div>
    </div>
  </div>

  <!-- エラー -->
  <div id="errCard" style="display:none">
    <div class="card">
      <div class="icon">⚠️</div>
      <div class="msg">エラーが発生しました</div>
      <div class="sub" id="errDetail"></div>
    </div>
  </div>
</div>

<!-- 紐づけモーダル -->
<div class="modal-bg" id="linkModal">
  <div class="modal">
    <h3>📱 LINEと会員情報を紐づける</h3>
    <p>登録時の電話番号を入力してください。</p>
    <input type="tel" id="linkTel" placeholder="例：080-0000-0000">
    <div id="linkErr" style="color:#c62828;font-size:.8rem;margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeLinkModal()">キャンセル</button>
      <button class="btn-ok-modal" id="linkBtn" onclick="execLink()">紐づける</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey: "AIzaSyA1EvrPURepmXG_G4NZcin5iHf0qmw-Zpw",
  authDomain: "sakurashi-kosodateshien.firebaseapp.com",
  projectId: "sakurashi-kosodateshien",
  storageBucket: "sakurashi-kosodateshien.firebasestorage.app",
  messagingSenderId: "365529893548",
  appId: "1:365529893548:web:99b2ecc702d1bbdb752d09"
}));

let currentLineUserId = '';

function calcMonths(dob){
  const d=new Date(dob),t=new Date();
  return (t.getFullYear()-d.getFullYear())*12+(t.getMonth()-d.getMonth());
}

function showMember(user){
  document.getElementById('loading').style.display='none';
  document.getElementById('memberCard').style.display='block';
  document.getElementById('mName').textContent = user.name + ' さん';
  document.getElementById('mUid').textContent  = 'ID: ' + user.uid;
  const months = calcMonths(user.childDob);
  document.getElementById('memberInfo').innerHTML = `
    <div class="info-row"><span class="info-label">月齢</span><span>${months}ヶ月</span></div>
    <div class="info-row"><span class="info-label">電話</span><span>${user.tel||'-'}</span></div>`;
  const base = location.origin + location.pathname.replace('liff_member.html','checkin.html');
  new QRCode(document.getElementById('qrcode'),{
    text: base+'?uid='+user.uid,
    width:200, height:200,
    colorDark:'#1a3a2a', colorLight:'#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

function showUnreg(){
  document.getElementById('loading').style.display='none';
  document.getElementById('unregCard').style.display='block';
}

window.openLinkModal = ()=>{ document.getElementById('linkModal').classList.add('open'); };
window.closeLinkModal = ()=>{ document.getElementById('linkModal').classList.remove('open'); };

window.execLink = async ()=>{
  const tel = document.getElementById('linkTel').value.trim();
  if(!tel){ document.getElementById('linkErr').textContent='電話番号を入力してください'; return; }
  const btn = document.getElementById('linkBtn');
  btn.disabled=true; btn.textContent='検索中…';
  try{
    const snap = await getDocs(collection(db,'users'));
    const userDoc = snap.docs.find(d=>{
      const t=(d.data().tel||'').replace(/[-\s]/g,'');
      return t===tel.replace(/[-\s]/g,'');
    });
    if(!userDoc){
      document.getElementById('linkErr').textContent='この電話番号の会員が見つかりませんでした';
      btn.disabled=false; btn.textContent='紐づける';
      return;
    }
    await updateDoc(doc(db,'users',userDoc.id),{ lineUserId: currentLineUserId });
    window.closeLinkModal();
    showMember({...userDoc.data(), lineUserId: currentLineUserId});
  }catch(e){
    document.getElementById('linkErr').textContent='エラー: '+e.message;
    btn.disabled=false; btn.textContent='紐づける';
  }
};

// メイン処理
async function main(){
  try{
    // LIFFを読み込む
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://static.line-scdn.net/liff/edge/2/sdk.js';
      s.onload=resolve; s.onerror=reject;
      document.head.appendChild(s);
    });

    await liff.init({ liffId:'2009587361-BBVXkOWi' });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    currentLineUserId = profile.userId;

    // Firestore全件取得してJS照合
    const snap = await getDocs(collection(db,'users'));
    const found = snap.docs.map(d=>({id:d.id,...d.data()}))
      .find(u=>u.lineUserId===currentLineUserId);

    if(found){ showMember(found); }
    else { showUnreg(); }

  }catch(e){
    console.error(e);
    showUnreg(); // エラー時も未登録画面を表示
  }
}

main();
</script>
</body>
</html>
