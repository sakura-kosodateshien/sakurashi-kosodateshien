const BASE=new Date(2026,3,6);
// 今日の日付からweekOffsetを計算（月曜起点の週）
function calcInitialWeekOffset(){
  const today=new Date(); today.setHours(0,0,0,0);
  const base=new Date(BASE); base.setHours(0,0,0,0);
  const diffDays=Math.round((today-base)/(24*3600*1000));
  // BASEは月曜日なので、今日が属する週の月曜日を求める
  const todayDow=today.getDay(); // 0=日,1=月...6=土
  const daysToMon=todayDow===0?-6:1-todayDow; // 今週月曜までのオフセット
  const thisMonday=new Date(today); thisMonday.setDate(today.getDate()+daysToMon);
  const diffFromBase=Math.round((thisMonday-base)/(24*3600*1000));
  return Math.round(diffFromBase/7);
}

function getWeekDates(){
  const d=new Date(BASE); d.setDate(BASE.getDate()+weekOffset*7);
  return Array.from({length:5},(_,i)=>{ const x=new Date(d); x.setDate(d.getDate()+i); return x; });
}
function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;

function changeWeek(d){ weekOffset+=d; initFirebase(); }
function setView(v,el){ viewMode=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }

// ガントチャート名 → 予約フォームprogName の対応マップ
const PROG_NAME_MAP = {
  '英語 7か月〜1才': '英語・知育',
  '英語 1才〜3才':   '英語・知育',
  '知育 1才〜3才':   '英語・知育',
  '知育 7か月〜1才': '英語・知育',
  '託児':            '託児ルーム',
};
function getBks(prog){
  const aliases = [prog.name, PROG_NAME_MAP[prog.name]].filter(Boolean);
  return liveBookings.filter(b =>
    b.date === prog.date &&
    b.status !== 'cancelled' &&
    (b.progId === prog.id ||
     aliases.includes(b.progName) ||
     aliases.some(a => (b.progName||'').includes(a.split(' ')[0]))
    )
  );
}

// ── 未確認バナー更新 ─────────────────────────────────────────────────
async function updatePendingBanner(){
  const banner=document.getElementById('pendingBanner');
  try{
    // Firestoreから直接取得（ローカルキャッシュに依存しない）
    if(!window._fbQueryPending){ banner.classList.remove('show'); return; }
    const snap = await window._fbQueryPending();
    const allPending = snap.docs.map(d=>({fbId:d.id,...d.data()}))
      .filter(b=>b.date>='2026-04-01');
    // liveBookingsも同期
    allPending.forEach(b=>{
      const idx = liveBookings.findIndex(x=>x.fbId===b.fbId);
      if(idx>=0) liveBookings[idx]=b; 
    });
    // liveBookingsのうちFirestoreにないpendingはconfirmedに修正
    liveBookings = liveBookings.map(b=>{
      if(b.status==='pending' && !allPending.find(x=>x.fbId===b.fbId)){
        return Object.assign({},b,{status:'confirmed'});
      }
      return b;
    });
    if(!allPending.length){banner.classList.remove('show');return;}
    banner.classList.add('show');
    document.getElementById('pendingCount').textContent='未確認 '+allPending.length+'件';
    const weekMap={};
    allPending.forEach(b=>{
      const bDate=new Date(b.date+'T00:00:00');
      const diffDays=Math.round((bDate-BASE)/(24*3600*1000));
      const wOff=Math.max(0,Math.floor(diffDays/7));
      const wStart=new Date(BASE); wStart.setDate(BASE.getDate()+wOff*7);
      const label=fmt(wStart)+'週';
      if(!weekMap[wOff]) weekMap[wOff]={label,count:0};
      weekMap[wOff].count++;
    });
    let html='';
    Object.keys(weekMap).sort((a,b)=>a-b).forEach(off=>{
      const w=weekMap[off];
      html+=`<button class="pending-week-btn" onclick="jumpToWeek(${off})">${w.label}（${w.count}件）</button>`;
    });
    document.getElementById('pendingWeeks').innerHTML=html;
  }catch(e){
    console.warn('pendingBanner更新エラー:',e.message);
    banner.classList.remove('show');
  }
}
window.jumpToWeek=function(off){ weekOffset=parseInt(off); initFirebase(); };

function render(){
  const dates=getWeekDates();
  const dks=dates.map(d=>dateKey(d));
  document.getElementById('wlabel').textContent=fmt(dates[0])+'〜'+fmt(dates[4]);
  const wps=ALL_PROGS.filter(p=>dks.includes(p.date));
  const progs=wps.filter(p=>viewMode==='all'||(viewMode==='s'&&p.type==='s')||(viewMode==='t'&&p.type==='t'));
  let sbk=0,tbk=0,full=0,avail=0,pend=0;
  wps.forEach(p=>{ const bks=getBks(p); const c=bks.length; const pc=bks.filter(b=>b.status==='pending').length; pend+=pc; if(p.type==='s')sbk+=c; else tbk+=c; if(p.cap<99){if(c>=p.cap)full++;else avail++;} });
  document.getElementById('sSbk').textContent=sbk+'組';
  document.getElementById('sTbk').textContent=tbk+'名';
  document.getElementById('sFull').textContent=full;
  document.getElementById('sAvail').textContent=pend;
  updatePendingBanner();

  const totalH=HOURS.length*PH;
  let g='<div></div>';
  dates.forEach((d,i)=>{ g+=`<div class="gh"><div class="gd">${DAYS_JP[i]}</div><div class="gn">${fmt(d)}</div></div>`; });
  g+=`<div style="display:flex;flex-direction:column">`;
  HOURS.forEach(h=>{ g+=`<div class="tc" style="height:${PH}px">${h}:00</div>`; });
  g+='</div>';
  for(let d=0;d<5;d++){
    const dayProgs=progs.filter(p=>p.day===d);
    g+=`<div class="dc" style="height:${totalH}px;position:relative">`;
    HOURS.forEach((_,i)=>{ if(i>0) g+=`<div class="hline" style="top:${i*PH}px"></div>`; });
    // 描画順：託児→支援P（支援Pが前面）
    const drawOrder=[...dayProgs.filter(p=>p.type==='t'),...dayProgs.filter(p=>p.type!=='t')];
    drawOrder.forEach(p=>{
      const top=((p.sh-9)+(p.sm/60))*PH;
      const ht=Math.max(((p.eh-p.sh)+((p.em-p.sm)/60))*PH,14);
      const bks=getBks(p); const cnt=bks.length;
      const pendCnt=bks.filter(b=>b.status==='pending').length;
      const isFull=cnt>=p.cap&&p.cap<99;
      const cls=p.cancelled?'blk bc':isFull?'blk bf':pendCnt>0?'blk bp':p.type==='t'?'blk bt':'blk bs';
      // 列分割
      const hasTochi=dayProgs.some(q=>q.type==='t');
      const sProgs=dayProgs.filter(q=>q.type==='s');
      const sIdx=sProgs.indexOf(p);
      const sTotal=sProgs.length;
      let pos='';
      if(p.type==='t'){
        pos='left:1px;width:48%;';
      } else if(hasTochi){
        const cols=Math.min(sTotal,2);
        const col=sIdx%cols;
        const uw=50/cols;
        pos=`left:${50+col*uw}%;width:${uw-0.5}%;`;
      } else {
        const cols=Math.min(sTotal,3);
        const col=sIdx%cols;
        const uw=98/cols;
        pos=`left:${1+col*uw}%;width:${uw-0.5}%;`;
      }
      const hasNote = bks.some(b=>b.note);
      g+=`<div class="${cls}" style="top:${top}px;height:${ht}px;${pos}" onclick="openPanel('${p.id}')">
        <div style="font-size:.63rem">${pendCnt>0?'⏳ '+p.name:p.name}${hasNote?' 📝':''}</div>
        <div style="font-size:.58rem;opacity:.9">${pendCnt>0?'+'+pendCnt+'未確認':p.cap<99?cnt+'/'+p.cap+'組':cnt+'名'}</div>
      </div>`;
    });
    g+='</div>';
  }
  document.getElementById('gantt').innerHTML=g;
}

window.confirmBooking=function(fbId, progId){
  if(!window._fbUpdateDoc){alert('Firebase接続中です。しばらくお待ちください。');return;}
  const btn=document.querySelector('#bkrow-'+fbId+' .confirm-btn');
  if(btn){btn.disabled=true;btn.textContent='確認中…';}

  // リスナーを一時停止（上書き防止）
  if(unsubFn){ unsubFn(); unsubFn=null; }

  window._fbUpdateDoc(fbId,{status:'confirmed'}).then(function(){
    // ローカル即時更新
    liveBookings=liveBookings.map(function(b){
      return b.fbId===fbId ? Object.assign({},b,{status:'confirmed'}) : b;
    });
    render();
    openPanel(progId);

    // 全pendingを再取得してバナー更新
    if(window._fbQueryPending){
      window._fbQueryPending().then(function(snap){
        const stillPending=snap.docs.map(function(d){return Object.assign({fbId:d.id},d.data());});
        liveBookings=liveBookings.map(function(b){
          if(b.status==='pending' && !stillPending.find(function(p){return p.fbId===b.fbId;})){
            return Object.assign({},b,{status:'confirmed'});
          }
          return b;
        });
        updatePendingBanner();
        // リスナー再起動（少し遅延させてFirebase反映を待つ）
        setTimeout(function(){ if(window.loadFirebase) loadFirebase(); }, 3000);
      }).catch(function(e){
        console.warn('pending再取得エラー:',e.message);
        setTimeout(function(){ if(window.loadFirebase) loadFirebase(); }, 3000);
      });
    } else {
      setTimeout(function(){ if(window.loadFirebase) loadFirebase(); }, 3000);
    }
  }).catch(function(e){
    alert('更新に失敗しました: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='✅ 確認';}
    // エラー時もリスナー再起動
    if(window.loadFirebase) loadFirebase();
  });
};

// ── Firebase連携（非同期・失敗しても表示は維持）────────────────────
function initFirebase(){
  render(); // まず即時描画
  if(typeof firebase_loaded === 'undefined') return;
  loadFirebase();
}

function loadFirebase(){
  if(unsubFn) unsubFn();
  const dates=getWeekDates();
  const dks=dates.map(d=>dateKey(d));
  const q=window._fbQuery(dks[0],dks[4]);
  if(!q) return;
  unsubFn=window._fbOnSnapshot(q, snap=>{
    const weekBks=snap.docs.map(d=>({fbId:d.id,...d.data()}));
    // ローカルでconfirmedに更新済みのものはFirestoreの古いpendingで上書きしない
    const localConfirmed=new Set(liveBookings.filter(b=>b.status==='confirmed').map(b=>b.fbId));
    const mergedBks=weekBks.map(b=>
      localConfirmed.has(b.fbId) && b.status==='pending'
        ? Object.assign({},b,{status:'confirmed'})
        : b
    );
    liveBookings=liveBookings.filter(b=>b.date<dks[0]||b.date>dks[4]).concat(mergedBks);
    render();
    fetchAllPending();
  }, err=>console.warn('FB error:',err.message));
}

// 全期間のpendingを取得してバナー更新
function fetchAllPending(){
  if(!window._fbQueryPending) return;
  window._fbQueryPending().then(function(snap){
    const pendingBks=snap.docs.map(d=>({fbId:d.id,...d.data()}));
    // liveBookingsの非今週部分をpendingで補完
    const dates=getWeekDates();
    const dks=dates.map(d=>dateKey(d));
    const otherPending=pendingBks.filter(b=>b.date<dks[0]||b.date>dks[4]);
    // 重複を除いてマージ
    const ids=new Set(liveBookings.map(b=>b.fbId));
    otherPending.forEach(b=>{ if(!ids.has(b.fbId)) liveBookings.push(b); else { liveBookings=liveBookings.map(x=>x.fbId===b.fbId?b:x); } });
    updatePendingBanner();
  }).catch(function(e){ console.warn('pending fetch error:',e.message); });
}

// 初期描画（Firebaseなしでも動作）
render();
</script>
