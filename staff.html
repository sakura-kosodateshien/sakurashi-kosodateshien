<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約管理 | スタッフ画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d6a4f;--mint:#74c69d;--warm:#f9a03f;--cream:#fdf8f2;--text:#1a2e22;--muted:#6b8f71;--border:#dceee2}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f6f4;min-height:100vh;color:var(--text)}
header{background:var(--green);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
header a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.82rem}
header h1{color:#fff;font-size:.95rem;font-weight:700;flex:1;text-align:center}
header .staff-badge{font-size:.68rem;background:var(--warm);color:#fff;padding:2px 8px;border-radius:20px;font-weight:700}

.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:6px}
.week-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:.8rem;cursor:pointer}
.week-label{font-size:.88rem;font-weight:700;min-width:110px;text-align:center}
.view-sel{margin-left:auto;display:flex;gap:4px}
.view-btn{font-size:.72rem;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--muted)}
.view-btn.active{background:var(--green);color:#fff;border-color:var(--green)}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid var(--border)}
.sc{padding:7px 8px;background:#f8faf8;border-radius:8px}
.sc .sl{font-size:.65rem;color:var(--muted)}
.sc .sv{font-size:1.1rem;font-weight:700}

.gantt-wrap{overflow-x:auto;padding:10px 12px}
.gantt{display:grid;grid-template-columns:44px repeat(5,1fr);background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:380px}
.gh{padding:7px 3px;text-align:center;background:#f0faf4;border-right:.5px solid var(--border);border-bottom:1px solid var(--border);font-size:.72rem;color:var(--muted)}
.gh .gd{font-size:.9rem;font-weight:700;color:var(--text)}
.gh .gn{font-size:.68rem}
.tc{font-size:.65rem;color:var(--muted);padding:2px 3px;text-align:right;background:#f8faf8;border-right:.5px solid var(--border)}
.dc{position:relative;border-right:.5px solid var(--border)}
.dc:last-child{border-right:none}
.hline{position:absolute;left:0;right:0;height:.5px;background:var(--border)}
.blk{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:.65rem;font-weight:700;overflow:hidden;cursor:pointer;line-height:1.3;transition:filter .1s}
.blk:hover{filter:brightness(.92);z-index:5}
.bs{background:#C0DD97;color:#27500A;border:.5px solid #639922}
.bt{background:#B5D4F4;color:#0C447C;border:.5px solid #378ADD;background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.3) 3px,rgba(255,255,255,.3) 4px)}
.bf{background:#F7C1C1;color:#791F1F;border:.5px solid #E24B4A}

.legend{display:flex;gap:10px;padding:6px 12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--muted)}
.ld{width:9px;height:9px;border-radius:2px}

/* 予約者パネル */
.panel-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end}
.panel-bg.open{display:flex}
.panel{background:#fff;border-radius:18px 18px 0 0;padding:18px 16px 36px;width:100%;max-width:520px;margin:0 auto;max-height:75vh;overflow-y:auto}
.panel h2{font-size:.95rem;font-weight:700;margin-bottom:10px}
.panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.panel-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.prog-badge{display:inline-block;font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:8px}
.bk-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;font-size:.82rem}
.bk-row:last-child{margin-bottom:0}
.bk-num{width:20px;height:20px;border-radius:50%;background:#f0faf4;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--green);flex-shrink:0}
.bk-name{flex:1;font-weight:500}
.bk-info{font-size:.72rem;color:var(--muted)}
.bk-stat{font-size:.68rem;padding:2px 7px;border-radius:20px;font-weight:700}
.s-ok{background:#e8f5e9;color:#2e7d32}
.s-wait{background:#fff8e1;color:#f57f17}
.s-cancel{background:#f5f5f5;color:#999}
.avail-info{background:#f0faf4;border-radius:8px;padding:8px 10px;font-size:.78rem;margin-bottom:10px;display:flex;justify-content:space-between}
.add-btn{width:100%;padding:11px;border:1.5px dashed var(--mint);border-radius:10px;background:#fff;color:var(--green);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
</style>
</head>
<body>
<header>
  <a href="index.html">← 戻る</a>
  <h1>🗂️ 予約管理</h1>
  <span class="staff-badge">STAFF</span>
</header>

<div class="toolbar">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">◀</button>
    <span class="week-label" id="wlabel"></span>
    <button onclick="changeWeek(1)">▶</button>
  </div>
  <div class="view-sel">
    <button class="view-btn active" onclick="setView('all',this)">全て</button>
    <button class="view-btn" onclick="setView('s',this)">支援P</button>
    <button class="view-btn" onclick="setView('t',this)">託児</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="gantt-wrap">
  <div class="gantt" id="gantt"></div>
</div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#C0DD97;border:.5px solid #639922"></div>支援プログラム</div>
  <div class="li"><div class="ld" style="background:#B5D4F4;border:.5px solid #378ADD"></div>託児</div>
  <div class="li"><div class="ld" style="background:#F7C1C1;border:.5px solid #E24B4A"></div>満員</div>
</div>

<div class="panel-bg" id="panelBg">
  <div class="panel">
    <div class="panel-head">
      <div>
        <h2 id="pTitle"></h2>
        <div id="pTime" style="font-size:.78rem;color:var(--muted)"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="avail-info" id="pAvail"></div>
    <div id="pList"></div>
    <button class="add-btn" onclick="addDummy()">＋ 新規予約を追加（デモ）</button>
  </div>
</div>

<script>
const PH=28;
const HOURS=[9,10,11,12,13,14];
const BASE=new Date(2026,3,6);
let weekOffset=0;
let viewMode='all';
let selectedIdx=null;

const PROGS=[
  {id:0,name:"ランチひろば",emoji:"🍱",type:"s",day:0,sh:12,sm:0,eh:14,em:0,cap:4,
   bookings:[{n:"山田 花子",age:"8ヶ月",s:"ok"},{n:"鈴木 美咲",age:"1才2ヶ月",s:"ok"}]},
  {id:1,name:"英語",emoji:"📚",type:"s",day:1,sh:10,sm:0,eh:12,em:0,cap:6,
   bookings:[{n:"田中 陽子",age:"7ヶ月",s:"ok"},{n:"伊藤 なつき",age:"10ヶ月",s:"ok"},{n:"佐藤 ゆり",age:"8ヶ月",s:"ok"}]},
  {id:2,name:"ランチひろば",emoji:"🍱",type:"s",day:2,sh:12,sm:0,eh:14,em:0,cap:4,
   bookings:[{n:"加藤 みか",age:"1才",s:"ok"},{n:"高橋 さやか",age:"2才",s:"ok"},{n:"渡辺 えり",age:"1才3ヶ月",s:"ok"},{n:"中村 はな",age:"8ヶ月",s:"ok"}]},
  {id:3,name:"知育",emoji:"📚",type:"s",day:3,sh:10,sm:0,eh:12,em:0,cap:6,
   bookings:[{n:"小林 かな",age:"1才5ヶ月",s:"ok"},{n:"吉田 りこ",age:"2才",s:"ok"}]},
  {id:4,name:"園庭遊び",emoji:"🌳",type:"s",day:4,sh:9,sm:0,eh:11,em:0,cap:99,
   bookings:[{n:"山本 ゆか",age:"1才",s:"ok"},{n:"松本 あい",age:"2才3ヶ月",s:"ok"},{n:"井上 のぞみ",age:"0才11ヶ月",s:"ok"}]},
  {id:5,name:"託児",emoji:"👶",type:"t",day:0,sh:10,sm:0,eh:12,em:0,cap:2,
   bookings:[{n:"佐々木 結衣",age:"1才",time:"10:00〜12:00",s:"ok"},{n:"齊藤 葵",age:"0才8ヶ月",time:"10:00〜12:00",s:"ok"}]},
  {id:6,name:"託児",emoji:"👶",type:"t",day:1,sh:9,sm:30,eh:11,em:30,cap:2,
   bookings:[{n:"藤田 凛",age:"2才",time:"9:30〜11:00",s:"ok"}]},
  {id:7,name:"託児",emoji:"👶",type:"t",day:2,sh:11,sm:0,eh:13,em:0,cap:2,
   bookings:[{n:"山口 さくら",age:"1才2ヶ月",time:"11:00〜13:00",s:"ok"},{n:"松田 ひな",age:"0才7ヶ月",time:"11:00〜12:30",s:"ok"}]},
  {id:8,name:"託児",emoji:"👶",type:"t",day:3,sh:9,sm:0,eh:11,em:30,cap:2,
   bookings:[{n:"中野 つばさ",age:"1才6ヶ月",time:"9:00〜10:30",s:"ok"}]},
  {id:9,name:"託児",emoji:"👶",type:"t",day:4,sh:10,sm:30,eh:12,em:30,cap:2,
   bookings:[{n:"小川 えな",age:"0才10ヶ月",time:"10:30〜12:00",s:"ok"},{n:"桐島 みれい",age:"1才1ヶ月",time:"10:30〜12:30",s:"ok"}]},
];

function changeWeek(d){ weekOffset+=d; render(); }
function setView(v,el){ viewMode=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }

function getWeekDates(){
  const d=new Date(BASE); d.setDate(BASE.getDate()+weekOffset*7);
  return Array.from({length:5},(_,i)=>{ const x=new Date(d); x.setDate(d.getDate()+i); return x; });
}
const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
const DAYS_JP=["月","火","水","木","金"];

function render(){
  const dates=getWeekDates();
  document.getElementById('wlabel').textContent=`${fmt(dates[0])}〜${fmt(dates[4])}`;
  const progs=PROGS.filter(p=>viewMode==='all'||(viewMode==='s'&&p.type==='s')||(viewMode==='t'&&p.type==='t'));
  const totalH=HOURS.length*PH;

  // summary
  const sp=PROGS.filter(p=>p.type==='s');
  const tp=PROGS.filter(p=>p.type==='t');
  const full=PROGS.filter(p=>p.bookings.filter(b=>b.s==='ok').length>=p.cap&&p.cap<99).length;
  const sbk=sp.reduce((a,p)=>a+p.bookings.filter(b=>b.s==='ok').length,0);
  const tbk=tp.reduce((a,p)=>a+p.bookings.filter(b=>b.s==='ok').length,0);
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sl">支援P予約</div><div class="sv">${sbk}<small style="font-size:.7rem;font-weight:400">組</small></div></div>
    <div class="sc"><div class="sl">託児予約</div><div class="sv">${tbk}<small style="font-size:.7rem;font-weight:400">名</small></div></div>
    <div class="sc"><div class="sl">満員枠</div><div class="sv" style="color:#c62828">${full}</div></div>
    <div class="sc"><div class="sl">空き枠</div><div class="sv" style="color:var(--green)">${PROGS.filter(p=>p.cap<99&&p.bookings.filter(b=>b.s==='ok').length<p.cap).length}</div></div>`;

  let g='<div></div>';
  dates.forEach((d,i)=>{ g+=`<div class="gh"><div class="gd">${DAYS_JP[i]}</div><div class="gn">${fmt(d)}</div></div>`; });
  g+=`<div style="display:flex;flex-direction:column">`;
  HOURS.forEach(h=>{ g+=`<div class="tc" style="height:${PH}px">${h}:00</div>`; });
  g+='</div>';
  for(let d=0;d<5;d++){
    const dp=progs.filter(p=>p.day===d);
    g+=`<div class="dc" style="height:${totalH}px;position:relative">`;
    HOURS.forEach((_,i)=>{ if(i>0) g+=`<div class="hline" style="top:${i*PH}px"></div>`; });
    dp.forEach(p=>{
      const top=((p.sh-9)+(p.sm/60))*PH;
      const ht=((p.eh-p.sh)+((p.em-p.sm)/60))*PH;
      const bk=p.bookings.filter(b=>b.s==='ok').length;
      const full=bk>=p.cap&&p.cap<99;
      const cls=full?'blk bf':p.type==='t'?'blk bt':'blk bs';
      g+=`<div class="${cls}" style="top:${top}px;height:${ht}px" onclick="openPanel(${p.id})">
        <div>${p.name}</div>
        <div style="font-size:.58rem;opacity:.85">${p.cap<99?bk+'/'+p.cap+'組':bk+'名'}</div>
      </div>`;
    });
    g+='</div>';
  }
  document.getElementById('gantt').innerHTML=g;
}

function openPanel(id){
  selectedIdx=id;
  const p=PROGS[id];
  document.getElementById('pTitle').textContent=`${p.emoji} ${p.name}`;
  document.getElementById('pTime').textContent=`${p.sh}:${String(p.sm).padStart(2,'0')}〜${p.eh}:${String(p.em).padStart(2,'0')}`;
  const bk=p.bookings.filter(b=>b.s==='ok').length;
  document.getElementById('pAvail').innerHTML=`<span>定員 ${p.cap<99?p.cap+'組':'制限なし'}</span><span>予約 <strong>${bk}${p.type==='t'?'名':'組'}</strong></span>${p.cap<99?`<span>残り <strong style="color:${bk>=p.cap?'#c62828':'var(--green)'}">${p.cap-bk}${p.type==='t'?'名':'組'}</strong></span>`:''}`;
  const smap={ok:'s-ok',wait:'s-wait',cancel:'s-cancel'};
  const slbl={ok:'確定',wait:'待機',cancel:'キャンセル'};
  let list='';
  p.bookings.forEach((b,i)=>{
    list+=`<div class="bk-row">
      <div class="bk-num">${i+1}</div>
      <div>
        <div class="bk-name">${b.n}</div>
        <div class="bk-info">${b.age||''}${b.time?' ／ '+b.time:''}</div>
      </div>
      <span class="bk-stat ${smap[b.s]}">${slbl[b.s]}</span>
    </div>`;
  });
  document.getElementById('pList').innerHTML=list;
  document.getElementById('panelBg').classList.add('open');
}

function closePanel(){ document.getElementById('panelBg').classList.remove('open'); }

function addDummy(){
  if(selectedIdx===null) return;
  const p=PROGS[selectedIdx];
  const names=["木村 さえ","橋本 ゆい","長谷川 あか","石井 ほの","福田 みこ"];
  p.bookings.push({n:names[Math.floor(Math.random()*names.length)],age:`${Math.floor(Math.random()*24)+1}ヶ月`,s:"ok"});
  openPanel(selectedIdx);
  render();
}

document.getElementById('panelBg').addEventListener('click',e=>{ if(e.target===document.getElementById('panelBg')) closePanel(); });

render();
</script>
</body>
</html>
