.hline{position:absolute;left:0;right:0;height:.5px;background:var(--border)}

];

const PH=28, HOURS=[9,10,11,12,13,14];
const BASE=new Date(2026,3,6);
const DAYS_JP=["жңҲ","зҒ«","ж°ҙ","жңЁ","йҮ‘"];
let weekOffset=0, viewMode='all', liveBookings=[], selectedProg=null;

function fmt(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
function dkey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function getWeekDates(){
  var d=new Date(BASE); d.setDate(BASE.getDate()+weekOffset*7);
  return [0,1,2,3,4].map(function(i){ var x=new Date(d); x.setDate(d.getDate()+i); return x; });
}

function getBookings(prog){
  return liveBookings.filter(function(b){
    return b.date===prog.date && b.status!=='cancelled' &&
      (b.progId===prog.id || (b.progName||'').indexOf(prog.name.split(' ')[0])>=0 || prog.name.indexOf(b.progName||'')>=0);
  });
}

function render(){
  var dates=getWeekDates();
  document.getElementById('wlabel').textContent=fmt(dates[0])+'гҖң'+fmt(dates[4]);
  var dateKeys=dates.map(dkey);
  var weekProgs=ALL_PROGS.filter(function(p){ return dateKeys.indexOf(p.date)>=0; });
  var progs=weekProgs.filter(function(p){
    return viewMode==='all'||(viewMode==='s'&&p.type==='s')||(viewMode==='t'&&p.type==='t');
  });
  var totalH=HOURS.length*PH;
  var sbk=0,tbk=0,full=0,avail=0;
  weekProgs.forEach(function(p){
    var cnt=getBookings(p).length;
    if(p.type==='s') sbk+=cnt;
    if(p.type==='t') tbk+=cnt;
    if(p.cap<99){ if(cnt>=p.cap) full++; else avail++; }
  });
  document.getElementById('sSbk').textContent=sbk;
  document.getElementById('sTbk').textContent=tbk;
  document.getElementById('sFull').textContent=full;
  document.getElementById('sAvail').textContent=avail;

  var g='<div></div>';
  dates.forEach(function(d,i){ g+='<div class="gh"><div class="gd">'+DAYS_JP[i]+'</div><div class="gn" style="font-size:.68rem">'+fmt(d)+'</div></div>'; });
  g+='<div style="display:flex;flex-direction:column">';
  HOURS.forEach(function(h){ g+='<div class="tc" style="height:'+PH+'px">'+h+':00</div>'; });
  g+='</div>';
  for(var di=0;di<5;di++){
    var dp=progs.filter(function(p){ return p.day===di; });
    g+='<div class="dc" style="height:'+totalH+'px;position:relative">';
    HOURS.forEach(function(_,hi){ if(hi>0) g+='<div class="hline" style="top:'+(hi*PH)+'px"></div>'; });
    dp.forEach(function(p){
      var top=((p.sh-9)+(p.sm/60))*PH;
      var ht=Math.max(((p.eh-p.sh)+((p.em-p.sm)/60))*PH,14);
      var cnt=getBookings(p).length;
      var isFull=cnt>=p.cap&&p.cap<99;
      var cls=p.cancelled?'blk bc':isFull?'blk bf':p.type==='t'?'blk bt':'blk bs';
      g+='<div class="'+cls+'" style="top:'+top+'px;height:'+ht+'px" onclick="openPanel(\''+p.id+'\')">';
      g+='<div>'+p.name+'</div>';
      g+='<div style="font-size:.58rem;opacity:.85">'+(p.cap<99?cnt+'/'+p.cap+'зө„':cnt+'еҗҚ')+'</div>';
      g+='</div>';
    });
    g+='</div>';
  }
  document.getElementById('gantt').innerHTML=g;
}

function openPanel(id){
  var p=ALL_PROGS.find(function(x){ return x.id===id; });
  if(!p) return;
  selectedProg=p;
  var bks=getBookings(p);
  document.getElementById('pTitle').textContent=p.emoji+' '+p.name;
  document.getElementById('pTime').textContent=p.date.slice(5).replace('-','/')+'гҖҖ'+p.sh+':'+String(p.sm).padStart(2,'0')+'гҖң'+p.eh+':'+String(p.em).padStart(2,'0');
  var avStr='е®ҡе“Ў '+(p.cap<99?p.cap+'зө„':'еҲ¶йҷҗгҒӘгҒ—')+' | дәҲзҙ„ '+bks.length+(p.type==='t'?'еҗҚ':'зө„');
  if(p.cap<99) avStr+=' | ж®ӢгӮҠ '+(p.cap-bks.length)+(p.type==='t'?'еҗҚ':'зө„');
  document.getElementById('pAvail').textContent=avStr;
  var list='';
  if(!bks.length){ list='<div style="font-size:.82rem;color:var(--muted);padding:8px 0">дәҲзҙ„гҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“</div>'; }
  else {
    bks.forEach(function(b,i){
      list+='<div class="bk-row">';
      list+='<div class="bk-num">'+(i+1)+'</div>';
      list+='<div style="flex:1"><div class="bk-name">'+(b.name||'')+(b.kana?' ('+b.kana+')':'')+'</div>';
      list+='<div class="bk-info">'+(b.age||'')+(b.childCount?' / '+b.childCount:'')+(b.tel?' рҹ“ұ'+b.tel:'')+(b.tochi?'<br>рҹ‘¶ иЁ—е…җ:'+(b.tochiTime||'жңӘе®ҡ'):'')+(b.note?'<br>рҹ“қ'+b.note:'')+'</div></div>';
      list+='<span style="font-size:.68rem;padding:2px 7px;border-radius:20px;background:#e8f5e9;color:#2e7d32;font-weight:700">зўәе®ҡ</span>';
      list+='</div>';
    });
  }
  document.getElementById('pList').innerHTML=list;
  document.getElementById('panelBg').classList.add('open');
}

document.getElementById('vT').onclick=function(){ viewMode='t'; document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active');}); this.classList.add('active'); render(); };
