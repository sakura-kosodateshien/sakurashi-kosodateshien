<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDFAF6;--surface:#fff;--s2:#F5F0E8;--border:#E8E0D0;
  --text:#2C2416;--muted:#7A6E60;--light:#B0A090;
  --accent:#D4673A;--al:#FAEEE7;--ad:#A84E28;
  --green:#4A7C5E;--blue:#3A6EA8;--bl:#E8F0FA;
  --ylw:#C8960A;--yl:#FEF7E0;
  --admin:#5B3FA8;--admin-l:#EFEBFA;
  --rsm:6px;--rmd:10px;--rlg:16px;
  --s1:0 1px 3px rgba(44,36,22,.06);
  --s2x:0 4px 16px rgba(44,36,22,.10);
  --s3:0 8px 32px rgba(44,36,22,.18);
}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.widget{max-width:720px;margin:0 auto;padding:1.25rem 1rem 2.5rem}
.hdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:1.25rem}
.hdr-icon{width:42px;height:42px;flex-shrink:0;background:var(--accent);border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr h1{font-size:17px;font-weight:700;line-height:1.3}
.hdr p{font-size:12px;color:var(--muted);margin-top:2px}
.srch{position:relative;margin-bottom:.875rem}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none}
.srch input{width:100%;padding:9px 12px 9px 35px;border:1.5px solid var(--border);border-radius:var(--rmd);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:var(--light)}
.fpanel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1rem 1.125rem;margin-bottom:1rem;box-shadow:var(--s1)}
.fg{margin-bottom:.875rem}.fg:last-child{margin-bottom:0}
.flabel{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--light);margin-bottom:7px;display:block}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:12px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:var(--surface);color:var(--muted);user-select:none;white-space:nowrap;transition:all .15s;font-family:inherit}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.ca{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.chip.cd{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.sbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.scnt{font-size:12px;color:var(--muted)}.scnt strong{color:var(--accent);font-weight:700}
.clr{font-size:12px;color:var(--light);cursor:pointer;background:none;border:none;font-family:inherit;text-decoration:underline}
.clr:hover{color:var(--accent)}
.results{display:flex;flex-direction:column;gap:7px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:.875rem 1rem;box-shadow:var(--s1);display:flex;gap:12px;align-items:flex-start;transition:box-shadow .15s,transform .15s}
.card:hover{box-shadow:var(--s2x);transform:translateY(-1px)}
.dco{flex-shrink:0;width:40px;text-align:center;padding-top:2px}
.dday{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.dwday{font-size:10px;color:var(--light);margin-top:2px}
.dvdr{width:1px;background:var(--border);align-self:stretch;flex-shrink:0}
.cbody{flex:1;min-width:0}
.ctitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-size:11px;padding:2px 7px;border-radius:var(--rsm);font-weight:500;white-space:nowrap}
.t-area{background:var(--bl);color:var(--blue)}
.t-ctr{background:var(--al);color:var(--ad);cursor:pointer;transition:background .15s}
.t-ctr:hover{background:#f5d9cc}
.t-time{background:var(--yl);color:var(--ylw)}
.t-note{background:var(--s2);color:var(--muted)}
.t-edit{background:var(--admin-l);color:var(--admin);cursor:pointer;border:none;font-family:inherit;font-size:11px;font-weight:500;padding:2px 7px;border-radius:var(--rsm)}
.t-edit:hover{background:#ddd5f5}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--light)}
.empty .ei{font-size:32px;margin-bottom:.625rem}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.fnote{font-size:11px;color:var(--light);text-align:center;margin-top:1.25rem;line-height:1.7}
.fnote a{color:var(--accent)}
.admin-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding:.625rem .875rem;background:var(--admin-l);border:1px solid #C5BAF0;border-radius:var(--rmd);font-size:12px;color:var(--admin)}
.admin-bar strong{font-weight:700}
.admin-bar .exit-btn{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:var(--rsm);border:1px solid #C5BAF0;background:#fff;color:var(--admin);cursor:pointer;font-family:inherit}
.admin-trigger{display:flex;justify-content:flex-end;margin-bottom:.5rem}
.admin-trigger button{font-size:11px;color:var(--light);background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 0;text-decoration:underline}
.ov{display:none;position:fixed;inset:0;background:rgba(44,36,22,.5);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:1rem}
.ov.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rlg);width:100%;max-width:460px;box-shadow:var(--s3);animation:fadeIn .2s ease}
@keyframes fadeIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:1.125rem 1.25rem .75rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;color:var(--light);cursor:pointer;line-height:1;padding:0 2px}
.modal-body{padding:1rem 1.25rem}
.field{margin-bottom:.875rem}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--admin)}
.field textarea{height:64px;resize:vertical}
.field .hint{font-size:10px;color:var(--light);margin-top:3px}
.modal-footer{padding:.75rem 1.25rem 1.125rem;display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;border-radius:var(--rmd);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer}
.btn-save{padding:8px 20px;border-radius:var(--rmd);border:none;background:var(--admin);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-save:hover{opacity:.88}
.cov{display:none;position:fixed;inset:0;background:rgba(44,36,22,.5);z-index:9998;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.cov.open{display:flex}
.cmodal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;box-shadow:var(--s3);animation:sup .22s cubic-bezier(.25,.8,.25,1)}
@keyframes sup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.cmhdl{padding:10px 0 2px;display:flex;justify-content:center}
.cmhdl span{width:34px;height:4px;border-radius:2px;background:var(--border);display:block}
.cmin{padding:0 1.25rem 1.5rem}
.cmhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.875rem}
.cmname{font-size:17px;font-weight:700;line-height:1.3;flex:1}
.cmarea{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--bl);color:var(--blue);font-weight:500;white-space:nowrap;margin-left:8px;flex-shrink:0;align-self:flex-start;margin-top:3px}
.cminfo{background:var(--s2);border-radius:var(--rmd);overflow:hidden;margin-bottom:1rem}
.cmrow{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}
.cmrow:last-child{border-bottom:none}
.cmric{font-size:14px;flex-shrink:0;width:16px;text-align:center;margin-top:1px}
.cmrlb{color:var(--muted);flex-shrink:0;width:52px;font-size:11px;padding-top:1px}
.cmrval{color:var(--text);line-height:1.5}
.cmacts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:var(--rmd);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;text-decoration:none;transition:opacity .15s,transform .1s}
.abtn:active{transform:scale(.97);opacity:.85}
.atel{background:var(--accent);color:#fff}
.amap{background:var(--green);color:#fff}
.aweb{background:var(--s2);color:var(--muted);grid-column:1/-1;font-size:12px;padding:10px 8px}
.cmclose{text-align:center;margin-top:.625rem}
.cmclose button{font-size:12px;color:var(--light);cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 14px}
.saving{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.widget{padding:1rem .75rem 2rem}.dday{font-size:18px}}

<body>
<div class="widget">
  <div class="hdr">
    <div class="hdr-icon">🌸</div>
    <div>
      <h1>子育て支援センター イベント検索</h1>
      <p>佐倉市 全8センター・2026年3月</p>
    </div>
  </div>
  <div class="srch">
    <span class="srch-ic">🔍</span>
    <input id="kw" type="text" placeholder="キーワード検索（例：マッサージ、試食、相談）" oninput="render()">
  </div>
  <div class="fpanel">
    <div class="fg">
      <span class="flabel">地区</span>
      <div class="chips" id="aChips">
        <span class="chip ca" data-v="all" onclick="setA(this)">すべて</span>
        <span class="chip" data-v="佐倉" onclick="setA(this)">佐倉</span>
        <span class="chip" data-v="臼井" onclick="setA(this)">臼井</span>
        <span class="chip" data-v="志津" onclick="setA(this)">志津</span>
      </div>
    </div>
    <div class="fg">
      <span class="flabel">日付</span>
      <div class="chips" id="dChips"></div>
    </div>
  </div>
  <div class="sbar">
    <span class="scnt" id="scnt"></span>
    <button class="clr" onclick="clearAll()">リセット</button>
  </div>
  <div class="admin-bar" id="adminBar" style="display:none">
    <span>🔑</span>
    <span><strong>管理者モード</strong>　✏️ ボタンで時間・備考を編集（全端末にリアルタイム反映）</span>
    <button class="exit-btn" onclick="exitAdmin()">終了</button>
  </div>
  <div class="admin-trigger" id="adminTrigger">
    <button onclick="showAdminLogin()">管理者ログイン</button>
  </div>
  <div class="results" id="res"><div class="loading">📡 データを読み込み中…</div></div>
  <p class="fnote">各センターの3月号おたよりをもとに作成。詳細は各センターへご確認ください。<br>
  出典：<a href="https://www.city.sakura.lg.jp/soshiki/kodomohoikuka/210/index.html" target="_blank">千葉県佐倉市 地域子育て支援センター</a></p>
</div>

<!-- ログインモーダル -->
<div class="ov" id="loginOv" onclick="if(event.target===this)closeLogin()">
  <div class="modal">
    <div class="modal-hdr"><h3>🔑 管理者ログイン</h3><button class="modal-close" onclick="closeLogin()">×</button></div>
    <div class="modal-body">
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="hint" id="pwErr" style="color:#E24B4A;display:none">パスワードが違います</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeLogin()">キャンセル</button>
      <button class="btn-save" onclick="doLogin()">ログイン</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="ov" id="editOv" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-hdr"><h3>✏️ イベント情報を編集</h3><button class="modal-close" onclick="closeEdit()">×</button></div>
    <div class="modal-body">
      <div class="field">
        <label>イベント名</label>
        <input type="text" id="eTitle" readonly style="background:var(--s2);color:var(--muted)">
      </div>
      <div class="field">
        <label>日付・センター</label>
        <input type="text" id="eMeta" readonly style="background:var(--s2);color:var(--muted)">
      </div>
      <div class="field">
        <label>時間</label>
        <input type="text" id="eTime" placeholder="例：10:00〜11:00">
        <div class="hint">「〜」で区切って入力してください</div>
      </div>
      <div class="field">
        <label>備考・補足</label>
        <textarea id="eNote" placeholder="例：要予約・定員10組"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn-save" id="saveBtn" onclick="saveEdit()">💾 保存</button>
    </div>
  </div>
</div>

<!-- 施設モーダル -->
<div class="cov" id="cov" onclick="if(event.target===this)closeCm()">
  <div class="cmodal">
    <div class="cmhdl"><span></span></div>
    <div class="cmin">
      <div class="cmhdr"><div class="cmname" id="mN"></div><span class="cmarea" id="mA"></span></div>
      <div class="cminfo" id="mI"></div>
      <div class="cmacts" id="mActs"></div>
      <div class="cmclose"><button onclick="closeCm()">閉じる</button></div>
    </div>
  </div>
</div>

// 日付チップ生成
const days = [...new Set(BASE_EVENTS.map(e=>e.d.slice(-2)))].sort();
const dc = document.getElementById("dChips");
const a0 = document.createElement("span");
a0.className="chip cd"; a0.textContent="すべて"; a0.dataset.v="all"; a0.onclick=()=>setD(a0); dc.appendChild(a0);
days.forEach(dd=>{
  const c=document.createElement("span"); c.className="chip";
  const n=parseInt(dd), w=WD[new Date(2026,2,n).getDay()];
  c.textContent=`${n}日(${w})`; c.dataset.v=dd; c.onclick=()=>setD(c); dc.appendChild(c);
});

let aA="all", aD="all", isAdmin=false, editingId=null, fbEdits={};

const editsRef = doc(db,"edits","events");
onSnapshot(editsRef, snap=>{
  fbEdits = snap.exists() ? (snap.data().data||{}) : {};
  render();
});

function getEvents(){
  return BASE_EVENTS.map(e=>{
    const k=String(e.id);
    return fbEdits[k] ? {...e,...fbEdits[k]} : {...e};
  });
}

window.setA=function(el){
  document.querySelectorAll("#aChips .chip").forEach(c=>c.classList.remove("ca"));
  el.classList.add("ca"); aA=el.dataset.v;
  logEvent(analytics,'filter_area',{area:aA});
  render();
};
window.setD=function(el){
  document.querySelectorAll("#dChips .chip").forEach(c=>c.classList.remove("cd"));
  el.classList.add("cd"); aD=el.dataset.v;
  logEvent(analytics,'filter_date',{date:aD});
  render();
};
window.clearAll=function(){
  document.getElementById("kw").value="";
  setA(document.querySelector("#aChips .chip"));
  setD(document.querySelector("#dChips .chip"));
};

function render(){
  const kw=document.getElementById("kw").value.trim().toLowerCase();
  const evs=getEvents();
  const f=evs.filter(e=>{
    const ao=aA==="all"||e.a===aA;
    const dо=aD==="all"||e.d.slice(-2)===aD;
    const ko=!kw||e.t.toLowerCase().includes(kw)||e.c.toLowerCase().includes(kw)||(e.n&&e.n.toLowerCase().includes(kw));
    return ao&&dо&&ko;
  });
  document.getElementById("scnt").innerHTML=`<strong>${f.length}</strong> 件のイベント`;
  const res=document.getElementById("res");
  if(!f.length){res.innerHTML=`<div class="empty"><div class="ei">🌱</div><p>該当するイベントが見つかりませんでした</p></div>`;return;}
  res.innerHTML=[...f].sort((a,b)=>a.d.localeCompare(b.d)).map(e=>{
    const n=parseInt(e.d.slice(-2)),w=WD[new Date(2026,2,n).getDay()];
    const cn=e.c.replace(/'/g,"\\'");
    const isEdited=!!fbEdits[String(e.id)];
    return`<div class="card">
      <div class="dco"><div class="dday">${n}</div><div class="dwday">${w}曜</div></div>
      <div class="dvdr"></div>
      <div class="cbody">
        <div class="ctitle">${e.t}${isEdited?'<span style="font-size:10px;color:var(--admin);margin-left:5px;font-weight:400">編集済</span>':''}</div>
        <div class="tags">
          <span class="tag t-area">${e.a}</span>
          <span class="tag t-ctr" onclick="openCm('${cn}')">📍 ${e.c}</span>
          ${e.tm?`<span class="tag t-time">🕐 ${e.tm}</span>`:''}
          ${e.n?`<span class="tag t-note">${e.n}</span>`:''}
          ${isAdmin?`<button class="t-edit" onclick="openEdit(${e.id})">✏️ 編集</button>`:''}
        </div>
      </div>
    </div>`;
  }).join("");
}

window.showAdminLogin=function(){
  document.getElementById("pwInput").value="";
  document.getElementById("pwErr").style.display="none";
  document.getElementById("loginOv").classList.add("open");
  setTimeout(()=>document.getElementById("pwInput").focus(),100);
};
window.closeLogin=function(){document.getElementById("loginOv").classList.remove("open");};
window.doLogin=function(){
  if(document.getElementById("pwInput").value===ADMIN_PW){
    isAdmin=true;
    document.getElementById("loginOv").classList.remove("open");
    document.getElementById("adminBar").style.display="flex";
    document.getElementById("adminTrigger").style.display="none";
    render();
  } else {
    document.getElementById("pwErr").style.display="block";
    document.getElementById("pwInput").value="";
    document.getElementById("pwInput").focus();
  }
};
window.exitAdmin=function(){
  isAdmin=false;
  document.getElementById("adminBar").style.display="none";
  document.getElementById("adminTrigger").style.display="flex";
  render();
};

window.openEdit=function(id){
  const evs=getEvents();
  const ev=evs.find(e=>e.id===id); if(!ev) return;
  editingId=id;
  document.getElementById("eTitle").value=ev.t;
  const d=parseInt(ev.d.slice(-2)),w=WD[new Date(2026,2,d).getDay()];
  document.getElementById("eMeta").value=`3月${d}日（${w}）・${ev.c}`;
  document.getElementById("eTime").value=ev.tm||"";
  document.getElementById("eNote").value=ev.n||"";
  document.getElementById("editOv").classList.add("open");
  setTimeout(()=>document.getElementById("eTime").focus(),100);
};
window.closeEdit=function(){document.getElementById("editOv").classList.remove("open");editingId=null;};
window.saveEdit=async function(){
  if(editingId===null) return;
  const btn=document.getElementById("saveBtn");
  btn.innerHTML='<span class="saving"></span>保存中…'; btn.disabled=true;
  const tm=document.getElementById("eTime").value.trim()||null;
  const n=document.getElementById("eNote").value.trim()||null;
  const newEdits={...fbEdits,[String(editingId)]:{tm,n}};
  try{
    await setDoc(editsRef,{data:newEdits});
    logEvent(analytics,'edit_event',{event_id:editingId});
    closeEdit();
  } catch(e){alert("保存に失敗しました: "+e.message);}
  btn.innerHTML='💾 保存'; btn.disabled=false;
};

window.openCm=function(name){
  const c=CENTERS[name]; if(!c) return;
  document.getElementById("mN").textContent=name;
  document.getElementById("mA").textContent=c.area+"地区";
  document.getElementById("mI").innerHTML=`
    <div class="cmrow"><span class="cmric">📍</span><span class="cmrlb">住所</span><span class="cmrval">${c.addr}</span></div>
    <div class="cmrow"><span class="cmric">📞</span><span class="cmrlb">電話番号</span><span class="cmrval">${c.tel}</span></div>
    <div class="cmrow"><span class="cmric">🕐</span><span class="cmrlb">開所時間</span><span class="cmrval">${c.hrs}</span></div>
  `;
  document.getElementById("mActs").innerHTML=`
    <a class="abtn atel" href="tel:${c.tel}" onclick="gtag('event','click_tel',{center:'${name}'})">📞 電話する</a>
    <a class="abtn amap" href="${c.map}" target="_blank" onclick="gtag('event','click_map',{center:'${name}'})">🗺 地図を見る</a>
    <a class="abtn aweb" href="${c.web}" target="_blank" onclick="gtag('event','click_web',{center:'${name}'})">🌐 公式サイトを見る</a>
  `;
  document.getElementById("cov").classList.add("open");
  logEvent(analytics,'view_center',{center:name});
};
window.closeCm=function(){document.getElementById("cov").classList.remove("open");};
