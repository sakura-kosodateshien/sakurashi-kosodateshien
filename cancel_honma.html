<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>pending全件確認・修正</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA1EvrPURepmXG_G4NZcin5iHf0qmw-Zpw",
  projectId:"sakurashi-kosodateshien"
});
const db = getFirestore(app);

window.addEventListener('load', async () => {
  const log = document.getElementById('log');
  log.textContent = '読み込み中...\n';
  const snap = await getDocs(query(
    collection(db,'bookings'),
    where('status','==','pending')
  ));
  if(snap.empty){
    log.textContent = '✅ pendingの予約は0件です（バナーはリロードで消えます）';
    return;
  }
  let html = '';
  snap.docs.forEach(d => {
    const b = d.data();
    html += `<div style="border:1px solid #ddd;padding:10px;margin-bottom:8px;border-radius:4px">
      <strong>${b.progName||b.progId||'-'}</strong> ${b.date||'-'}<br>
      名前: ${b.name||'-'}　tel: ${b.tel||'-'}<br>
      <span style="color:#856404">status: ${b.status}</span><br>
      <button onclick="cancelOne('${d.id}',this)" style="margin-top:6px;padding:4px 12px;background:#c62828;color:#fff;border:none;cursor:pointer;font-size:.8rem">
        キャンセルにする
      </button>
    </div>`;
  });
  document.getElementById('list').innerHTML = html;
  log.textContent = `pending: ${snap.docs.length}件見つかりました`;

  document.getElementById('cancelAllBtn').style.display = 'block';
  document.getElementById('cancelAllBtn').onclick = async () => {
    for(const d of snap.docs){
      await updateDoc(doc(db,'bookings',d.id), {status:'cancelled'});
    }
    log.textContent = `✅ ${snap.docs.length}件すべてキャンセルにしました。staff.htmlをリロードしてください。`;
    document.getElementById('list').innerHTML = '';
    document.getElementById('cancelAllBtn').disabled = true;
  };

  window.cancelOne = async (id, btn) => {
    await updateDoc(doc(db,'bookings',id), {status:'cancelled'});
    btn.closest('div').style.opacity = '0.4';
    btn.textContent = 'キャンセル済み';
    btn.disabled = true;
  };
});
</script>
</head><body style="font-family:sans-serif;padding:20px;max-width:600px">
<h2>pending予約 全件確認</h2>
<pre id="log" style="background:#f5f5f5;padding:10px;font-size:.82rem"></pre>
<button id="cancelAllBtn" style="display:none;margin:10px 0;padding:10px 20px;background:#c62828;color:#fff;border:none;cursor:pointer;font-weight:700">
  すべてキャンセルにする
</button>
<div id="list"></div>
</body></html>
