<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>pending予約 全件確認</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA1EvrPURepmXG_G4NZcin5iHf0qmw-Zpw",
  projectId:"sakurashi-kosodateshien"
});
const db = getFirestore(app);

window.addEventListener('load', async () => {
  const log = document.getElementById('log');
  log.textContent = '読み込み中...\n';
  // pending全件を取得
  const snap = await getDocs(query(
    collection(db,'bookings'),
    where('status','==','pending')
  ));
  if(snap.empty){ log.textContent = 'pendingの予約はありません'; return; }
  snap.docs.forEach(d => {
    const b = d.data();
    log.textContent += `id:${d.id}\n  名前:${b.name||'-'} tel:${b.tel||'-'}\n  ${b.progName||b.progId} ${b.date}\n\n`;
  });
  document.getElementById('cancelBtn').style.display = 'block';

  document.getElementById('cancelBtn').onclick = async () => {
    log.textContent = '処理中...\n';
    let count = 0;
    for(const d of snap.docs){
      await updateDoc(doc(db,'bookings',d.id), { status:'cancelled' });
      const b = d.data();
      log.textContent += `✅ ${b.name} ${b.progName||b.progId} ${b.date}\n`;
      count++;
    }
    log.textContent += `\n完了: ${count}件キャンセル`;
    document.getElementById('cancelBtn').disabled = true;
  };
});
</script>
</head><body style="font-family:sans-serif;padding:20px;max-width:600px">
<h2>pending予約 全件確認・キャンセル</h2>
<button id="cancelBtn" style="display:none;margin:12px 0;padding:10px 20px;background:#c62828;color:#fff;border:none;cursor:pointer;font-size:.9rem">
  上記をすべてキャンセルにする
</button>
<pre id="log" style="background:#f5f5f5;padding:12px;font-size:.78rem;white-space:pre-wrap;min-height:80px"></pre>
</body></html>
